<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海底补习记(云端同步版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ================= CONFIG =================
        const ADMIN_PASSWORD = "L1ng@Q1an"; 
        // ==========================================

        const firebaseConfig = {
          apiKey: "AIzaSyCtw29Kz1An1PjIpI1lFCPUCjOsGGZTaAA",
          authDomain: "seatuition-2.firebaseapp.com",
          projectId: "seatuition-2",
          storageBucket: "seatuition-2.firebasestorage.app",
          messagingSenderId: "1081496173041",
          appId: "1:1081496173041:web:7cfe63d1eec0f77290ec50",
          measurementId: "G-FM41SK8LXH"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 压缩图片用于头像、收据、聊天发送
        const compressImage = (file) => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
              const img = new Image(); img.src = event.target.result;
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; 
                let width = img.width; let height = img.height;
                if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.6)); 
              };
            };
          });
        };

        const Icons = {
          Home: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
          Calendar: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
          Lock: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
          Unlock: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>,
          Check: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
          Settings: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
          Download: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
          Users: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>,
          CreditCard: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>,
          Edit: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 Z"/></svg>,
          Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
          Play: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
          FileText: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>,
          Message: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>,
          Mic: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>,
          Square: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect></svg>,
          Image: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        };

        function App() {
          const [ready, setReady] = useState(false);
          const [activeTab, setActiveTab] = useState('home');
          const [isAdmin, setIsAdmin] = useState(false);
          const [editTuitionId, setEditTuitionId] = useState(null);

          // 记录本地已读的消息数量
          const [lastSeenMsgCount, setLastSeenMsgCount] = useState(() => parseInt(localStorage.getItem('sea_last_seen_msg') || '0', 10));

          const [currentDate] = useState(new Date());
          const currentMonthStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;

          const [childrenList, setChildren] = useState([]);
          const [teachers, setTeachers] = useState([]);
          const [tuitions, setTuitions] = useState([]);
          const [bills, setBills] = useState([]);
          const [attendance, setAttendance] = useState([]);
          const [messages, setMessages] = useState([]);

          useEffect(() => {
            auth.signInAnonymously();
            const unsubAuth = auth.onAuthStateChanged(user => { if(user) setReady(true); });
            return () => unsubAuth();
          }, []);

          useEffect(() => {
            if (!ready) return;
            const unsubs = [
              db.collection('children').onSnapshot(snap => setChildren(snap.docs.map(d => ({id: d.id, ...d.data()})))),
              db.collection('teachers').onSnapshot(snap => setTeachers(snap.docs.map(d => ({id: d.id, ...d.data()})))),
              db.collection('tuitions').onSnapshot(snap => setTuitions(snap.docs.map(d => ({id: d.id, ...d.data()})))),
              db.collection('bills').onSnapshot(snap => setBills(snap.docs.map(d => ({id: d.id, ...d.data()})))),
              db.collection('attendance').onSnapshot(snap => setAttendance(snap.docs.map(d => ({id: d.id, ...d.data()})))),
              db.collection('messages').orderBy('timestamp', 'asc').limit(150).onSnapshot(snap => setMessages(snap.docs.map(d => ({id: d.id, ...d.data()}))))
            ];
            return () => unsubs.forEach(fn => fn());
          }, [ready]);

          // 当切换到聊天大厅时，更新已读消息数
          useEffect(() => {
            if (activeTab === 'chat') {
              setLastSeenMsgCount(messages.length);
              localStorage.setItem('sea_last_seen_msg', messages.length.toString());
            }
          }, [messages, activeTab]);

          const unreadCount = Math.max(0, messages.length - lastSeenMsgCount);

          // 自动生成账单
          useEffect(() => {
            if (!ready || tuitions.length === 0) return;
            tuitions.forEach(t => {
              const billExists = bills.some(b => b.tuitionId === t.id && b.month === currentMonthStr);
              if (!billExists) {
                db.collection('bills').add({
                  tuitionId: t.id, teacherId: t.teacherId, childId: t.childId,
                  month: currentMonthStr, amount: t.feeAmount, status: 'unpaid', createdAt: Date.now()
                });
              }
            });
          }, [ready, tuitions, currentMonthStr, bills]);

          const handleAdminLogin = () => {
            if (isAdmin) { setIsAdmin(false); setActiveTab('home'); return; }
            const pw = prompt("请输入管理员密码：");
            if (pw === ADMIN_PASSWORD) { setIsAdmin(true); } 
            else if (pw !== null) { alert("密码错误！"); }
          };

          const handleExport = () => {
            let csv = "\uFEFF";
            const addTable = (title, header, rows) => {
              csv += `${title}\n${header.join(",")}\n`;
              rows.forEach(r => csv += r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(",") + "\n");
              csv += "\n";
            };
            addTable("【学生名单】", ["姓名", "身份"], childrenList.map(c => [c.name, c.type==='own'?'儿女':'侄儿女']));
            addTable("【付款记录】", ["月份", "学生", "金额", "状态"], bills.map(b => [b.month, childrenList.find(c=>c.id===b.childId)?.name, b.amount || '待定', b.status==='paid'?'已付':'未付']));
            
            const attRows = [];
            attendance.forEach(a => {
              const cName = childrenList.find(c => c.id === tuitions.find(t=>t.id===a.tuitionId)?.childId)?.name || '未知';
              if(a.dateRecords) Object.keys(a.dateRecords).forEach(d => {
                const r = a.dateRecords[d];
                const statusText = r.status==='attended'?'已补':r.status==='missed'?'缺席':r.status==='replay'?'看过回播':r.status==='cancelled'?'补习取消':'待补';
                attRows.push([a.month, cName, a.subName, d, statusText, r.reason||'-']);
              });
            });
            addTable("【全历史打卡记录】", ["月份", "学生", "科目", "日期", "状态", "备注"], attRows);
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `海底补习数据_${currentMonthStr}.csv`;
            link.click();
          };

          if (!ready) return <div className="text-2xl text-center p-10 font-bold text-slate-500 mt-20">🌊 正在连线云端... 所有设备将保持同步</div>;

          return (
            <div className="min-h-screen relative bg-slate-50 flex flex-col">
              <style>{`.no-scrollbar::-webkit-scrollbar { display: none; }`}</style>
              
              <div className="bg-white border-b sticky top-0 z-50 px-4 py-3 flex justify-between items-center shadow-sm">
                <h1 className="text-xl font-black text-blue-600 flex items-center gap-1">🐚 海底补习记</h1>
                <button onClick={handleAdminLogin} className={`px-4 py-2 rounded-xl flex items-center gap-2 font-bold transition-all ${isAdmin ? 'bg-red-100 text-red-600' : 'bg-blue-600 text-white shadow-lg'}`}>
                  {isAdmin ? <Icons.Unlock /> : <Icons.Lock />} {isAdmin ? '退出管理' : '管理员'}
                </button>
              </div>

              <div className="max-w-4xl mx-auto p-4 w-full flex-1">
                {activeTab === 'home' && (
                  <div className="space-y-6">
                    <HomeView childrenList={childrenList} tuitions={tuitions} isAdmin={isAdmin} bills={bills} currentMonthStr={currentMonthStr} teachers={teachers} attendance={attendance} db={db} onEditTuition={(tid)=>{setEditTuitionId(tid); setActiveTab('tuitions');}} />
                    <CalendarView childrenList={childrenList} tuitions={tuitions} />
                    
                    {/* 未读消息置底提醒 (在日历下方) */}
                    {unreadCount > 0 && (
                       <div onClick={()=>{setActiveTab('chat'); window.scrollTo(0,0)}} className="bg-pink-100 border-2 border-pink-300 p-5 rounded-[32px] shadow-sm cursor-pointer hover:bg-pink-200 transition-colors flex justify-between items-center animate-in slide-in-from-bottom">
                         <div>
                           <h2 className="text-pink-800 font-black mb-1 flex items-center gap-2"><Icons.Message /> 交流大厅有新消息！</h2>
                           <p className="text-pink-600 text-sm font-bold">大家发了 {unreadCount} 条新消息，点击去看看吧！</p>
                         </div>
                         <div className="bg-pink-500 text-white rounded-full w-10 h-10 flex items-center justify-center font-black animate-bounce shadow-md">{unreadCount}</div>
                       </div>
                    )}
                  </div>
                )}
                {activeTab === 'attendance' && <AttendanceView childrenList={childrenList} tuitions={tuitions} attendance={attendance} currentMonthStr={currentMonthStr} db={db} />}
                {activeTab === 'fees' && <FeesView childrenList={childrenList} tuitions={tuitions} bills={bills} teachers={teachers} currentMonthStr={currentMonthStr} />}
                {activeTab === 'chat' && <ChatView childrenList={childrenList} messages={messages} db={db} compressImage={compressImage} />}
                
                {isAdmin && activeTab === 'payments' && <PaymentManager childrenList={childrenList} tuitions={tuitions} teachers={teachers} bills={bills} currentMonthStr={currentMonthStr} db={db} />}
                {isAdmin && activeTab === 'tuitions' && <TuitionManager childrenList={childrenList} teachers={teachers} tuitions={tuitions} currentMonthStr={currentMonthStr} db={db} editTuitionId={editTuitionId} setEditTuitionId={setEditTuitionId} />}
                {isAdmin && activeTab === 'children' && <ChildrenManager childrenList={childrenList} db={db} />}
              </div>

              {/* 固定底栏及署名 */}
              <div className="mt-auto">
                 <div className="text-center text-sm text-slate-400 font-bold py-6 pb-28 opacity-70">
                    This app is made by Suelane, 11/5/2026.
                 </div>
                 
                 <div className="bg-white/95 backdrop-blur border-t fixed bottom-0 left-0 right-0 p-2 z-50">
                   <div className="max-w-4xl mx-auto flex gap-1 overflow-x-auto no-scrollbar justify-start sm:justify-around items-center px-2">
                     <NavBtn active={activeTab==='home'} label="首页日历" icon={<Icons.Home />} onClick={()=>{setActiveTab('home'); window.scrollTo(0,0)}} />
                     <NavBtn active={activeTab==='attendance'} label="打卡记事" icon={<Icons.Check />} onClick={()=>{setActiveTab('attendance'); window.scrollTo(0,0)}} />
                     <NavBtn active={activeTab==='fees'} label="费用明细" icon={<Icons.FileText />} onClick={()=>{setActiveTab('fees'); window.scrollTo(0,0)}} />
                     
                     <NavBtn active={activeTab==='chat'} label="交流大厅" icon={<Icons.Message />} badge={activeTab !== 'chat' ? unreadCount : 0} onClick={()=>{setActiveTab('chat'); window.scrollTo(0,0)}} />
                     
                     {isAdmin && (
                       <React.Fragment>
                         <div className="w-[2px] h-8 bg-slate-200 mx-2 flex-shrink-0"></div>
                         <NavBtn active={activeTab==='payments'} label="付款管理" icon={<Icons.CreditCard />} onClick={()=>{setActiveTab('payments'); window.scrollTo(0,0)}} />
                         <NavBtn active={activeTab==='tuitions'} label="排课设置" icon={<Icons.Settings />} onClick={()=>{setActiveTab('tuitions'); window.scrollTo(0,0)}} />
                         <NavBtn active={activeTab==='children'} label="名单管理" icon={<Icons.Users />} onClick={()=>{setActiveTab('children'); window.scrollTo(0,0)}} />
                         <NavBtn active={false} label="导出数据" icon={<Icons.Download />} onClick={handleExport} />
                       </React.Fragment>
                     )}
                   </div>
                 </div>
              </div>

            </div>
          );
        }

        function NavBtn({active, label, icon, onClick, badge}) {
          return (
            <button onClick={onClick} className={`relative flex flex-col items-center p-2 rounded-2xl flex-shrink-0 min-w-[70px] transition-all ${active ? 'text-blue-600 font-bold scale-105 bg-blue-50' : 'text-slate-500 hover:bg-slate-50'}`}>
              {badge > 0 && <span className="absolute top-0 right-2 bg-red-500 text-white text-[10px] font-black w-4 h-4 flex items-center justify-center rounded-full shadow-md animate-pulse">{badge > 9 ? '9+' : badge}</span>}
              {icon}
              <span className="text-[10px] mt-1 whitespace-nowrap">{label}</span>
            </button>
          );
        }

        // --- 费用明细视图 (非 Admin 可见) ---
        function FeesView({ childrenList, tuitions, bills, teachers, currentMonthStr }) {
          const currentBills = bills.filter(b => b.month === currentMonthStr);
          
          return (
            <div className="space-y-6">
              <div className="bg-gradient-to-br from-indigo-500 to-purple-600 p-6 rounded-[32px] text-white shadow-lg">
                <h2 className="text-2xl font-black mb-2 flex items-center gap-2"><Icons.FileText /> 个人费用明细 ({currentMonthStr})</h2>
                <p className="opacity-90 text-sm">在这里可以看到每个人这个月的补习单项收费和总计哦！</p>
              </div>

              {childrenList.map(child => {
                const childBills = currentBills.filter(b => b.childId === child.id);
                if (childBills.length === 0) return null;
                
                const totalAmount = childBills.reduce((sum, b) => sum + (parseFloat(b.amount) || 0), 0);

                return (
                  <div key={child.id} className="bg-white border-2 rounded-[28px] overflow-hidden shadow-sm" style={{borderColor: child.color}}>
                    <div className="p-4 text-xl font-black text-white flex justify-between items-center" style={{backgroundColor: child.color}}>
                       {child.name} 的本月账单
                       <span className="bg-white/20 px-3 py-1 rounded-full text-sm">总计: RM {totalAmount.toFixed(2)}</span>
                    </div>
                    <div className="p-4 space-y-3">
                      {childBills.map(bill => {
                         const tuition = tuitions.find(t => t.id === bill.tuitionId);
                         const teacher = teachers.find(t => t.id === bill.teacherId);
                         const subjectsStr = tuition?.subjectList ? tuition.subjectList.map(s=>s.name).join(' + ') : (tuition?.subjects || '补习');
                         const feeTypeLabel = tuition?.feeType === 'package' ? `配套收费 (${tuition.packageDuration}个月)` : '按月收费';

                         return (
                           <div key={bill.id} className="bg-slate-50 p-4 rounded-2xl flex justify-between items-center border border-slate-100">
                             <div>
                                <div className="font-bold text-slate-800 text-lg">{subjectsStr}</div>
                                <div className="text-sm text-slate-500">{teacher?.name} 老师 | {feeTypeLabel}</div>
                             </div>
                             <div className="text-xl font-black text-slate-800">
                                {bill.amount ? `RM ${bill.amount}` : '待定'}
                             </div>
                           </div>
                         )
                      })}
                    </div>
                  </div>
                )
              })}
              {currentBills.length === 0 && <div className="text-center p-10 text-slate-400 font-bold">本月还没有产生任何费用记录呢。</div>}
            </div>
          )
        }

        // --- 交流大厅视图 ---
        function ChatView({ childrenList, messages, db, compressImage }) {
          const [senderId, setSenderId] = useState(() => localStorage.getItem('sea_chat_identity') || null);
          const [text, setText] = useState('');
          const [isRecording, setIsRecording] = useState(false);
          const [mediaRecorder, setMediaRecorder] = useState(null);
          const messagesEndRef = useRef(null);

          const scrollToBottom = () => {
            messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
          };

          useEffect(() => {
            scrollToBottom();
          }, [messages, senderId]);

          const handleSelectIdentity = (id) => {
             setSenderId(id);
             localStorage.setItem('sea_chat_identity', id);
          };

          const requestChangeIdentity = () => {
             const pw = prompt("如需更换这台设备的身份，请输入管理员密码：\n(若不知道请找妈妈或管理员)");
             if (pw === ADMIN_PASSWORD) {
                 setSenderId(null);
                 localStorage.removeItem('sea_chat_identity');
                 alert("身份已解绑，请重新选择！");
             } else if (pw !== null) {
                 alert("密码不正确！");
             }
          };

          const handleSendText = async (e) => {
            e.preventDefault();
            if (!text.trim() || !senderId) return;
            await db.collection('messages').add({
              childId: senderId,
              text: text.trim(),
              timestamp: Date.now()
            });
            setText('');
          };

          const isMeParent = senderId && senderId.startsWith('parent_');
          
          const handleProfilePicUpload = async (e) => {
            const file = e.target.files[0];
            if (!file || !senderId || isMeParent) return;
            try {
              const base64 = await compressImage(file);
              await db.collection('children').doc(senderId).update({ profilePic: base64 });
              alert("头像更新成功！");
            } catch (err) {
              alert("图片处理失败。");
            }
          };

          const handleChatImageUpload = async (e) => {
            const file = e.target.files[0];
            if (!file || !senderId) return;
            try {
              const base64 = await compressImage(file);
              await db.collection('messages').add({
                childId: senderId,
                imageData: base64,
                timestamp: Date.now()
              });
            } catch (err) {
              alert("发送图片失败。");
            }
          };

          const handleEditMsg = async (msgId, oldText) => {
             const newText = prompt("修改您的消息：", oldText || "");
             if (newText !== null && newText.trim() !== "") {
                await db.collection('messages').doc(msgId).update({ text: newText.trim() });
             }
          };

          const handleDeleteMsg = async (msgId) => {
             if (confirm("确定要撤回这条消息吗？")) {
                await db.collection('messages').doc(msgId).delete();
             }
          };

          const startRecording = async () => {
            try {
              const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
              const recorder = new MediaRecorder(stream);
              setMediaRecorder(recorder);
              recorder.start();
              setIsRecording(true);

              const chunks = [];
              recorder.ondataavailable = e => chunks.push(e.data);
              recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                  const base64Audio = reader.result;
                  await db.collection('messages').add({
                    childId: senderId,
                    audioData: base64Audio,
                    timestamp: Date.now()
                  });
                };
              };
            } catch(err) {
               alert("无法访问麦克风，请检查手机/浏览器的权限设置。");
            }
          };

          const stopRecording = () => {
            if (mediaRecorder) {
              mediaRecorder.stop();
              setIsRecording(false);
              mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
          };

          const emojis = ['😀','😂','🥰','😎','🥺','😭','😡','👍','❤️','🎉','📚','✏️'];

          if (!senderId) {
             return (
               <div className="space-y-6">
                 <div className="bg-gradient-to-br from-pink-400 to-orange-400 p-6 rounded-[32px] text-white shadow-lg text-center">
                   <h2 className="text-3xl font-black mb-2">🎈 欢迎来到交流大厅</h2>
                   <p className="opacity-90">请选择这台设备属于谁？<br/><span className="text-sm">(选定后将绑定此设备)</span></p>
                 </div>
                 <div className="grid grid-cols-2 gap-4">
                   {childrenList.map(c => (
                     <button key={c.id} onClick={()=>handleSelectIdentity(c.id)} className="p-6 rounded-3xl text-white font-black text-2xl shadow-md transition-transform active:scale-95 flex flex-col items-center gap-3" style={{backgroundColor: c.color}}>
                       {c.profilePic ? <img src={c.profilePic} className="w-16 h-16 rounded-full object-cover border-4 border-white/50" /> : <div className="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center text-3xl">👤</div>}
                       {c.name}
                     </button>
                   ))}
                   
                   <button onClick={()=>{
                     const pName = prompt("请输入您的名字 (如：妈妈、爸爸、小姨)：");
                     if (pName && pName.trim() !== '') {
                        handleSelectIdentity('parent_' + pName.trim());
                     }
                   }} className="p-6 rounded-3xl text-white font-black text-2xl shadow-md transition-transform active:scale-95 flex flex-col items-center gap-3 bg-slate-700">
                     <div className="w-16 h-16 rounded-full bg-white/10 border-2 border-white/30 flex items-center justify-center text-3xl">👨‍👩‍👧‍👦</div>
                     我是家长
                   </button>
                 </div>
               </div>
             )
          }

          const me = isMeParent ? { name: senderId.replace('parent_', ''), color: '#334155' } : childrenList.find(c => c.id === senderId);

          return (
             <div className="flex flex-col h-[calc(100vh-200px)] rounded-[32px] shadow-lg overflow-hidden border border-white relative">
                <div className="absolute inset-0 bg-gradient-to-br from-pink-100 via-purple-100 to-cyan-100 opacity-60 z-0"></div>

                <div className="bg-white/80 backdrop-blur p-4 border-b border-white flex justify-between items-center shrink-0 z-10">
                  <div className="flex items-center gap-3">
                    <div className="relative group">
                       {me?.profilePic ? 
                         <img src={me.profilePic} className="w-12 h-12 rounded-full object-cover border-2 shadow-sm" style={{borderColor: me.color}} /> : 
                         <div className="w-12 h-12 rounded-full flex items-center justify-center text-xl text-white shadow-sm" style={{backgroundColor: me?.color}}>
                            {isMeParent ? '👨‍👩‍👧‍👦' : '👤'}
                         </div>
                       }
                       {!isMeParent && (
                         <label className="absolute bottom-0 right-0 bg-white rounded-full p-1 shadow cursor-pointer">
                           <Icons.Edit />
                           <input type="file" className="hidden" accept="image/*" onChange={handleProfilePicUpload} />
                         </label>
                       )}
                    </div>
                    <div>
                      <div className="font-black text-slate-800">{me?.name}</div>
                      {!isMeParent && <div className="text-[10px] text-slate-500">点击头像可更换图片</div>}
                    </div>
                  </div>
                  <button onClick={requestChangeIdentity} className="text-[10px] font-bold text-slate-500 bg-white shadow-sm px-3 py-2 rounded-full active:scale-95">申请换号</button>
                </div>

                <div className="flex-1 p-4 overflow-y-auto space-y-4 z-10">
                  {messages.map(msg => {
                    const isMe = msg.childId === senderId;
                    const isMsgParent = msg.childId && msg.childId.startsWith('parent_');
                    const senderInfo = isMsgParent ? { name: msg.childId.replace('parent_', ''), color: '#334155' } : childrenList.find(c => c.id === msg.childId);
                    
                    return (
                      <div key={msg.id} className={`flex gap-2 group ${isMe ? 'flex-row-reverse' : 'flex-row'}`}>
                        {senderInfo?.profilePic ? 
                          <img src={senderInfo.profilePic} className="w-8 h-8 rounded-full object-cover shrink-0 mt-1 shadow-sm border border-white" /> :
                          <div className="w-8 h-8 rounded-full shrink-0 mt-1 flex items-center justify-center text-white text-xs font-bold shadow-sm" style={{backgroundColor: senderInfo?.color||'#ccc'}}>{senderInfo?.name?.[0]||'?'}</div>
                        }
                        
                        <div className={`max-w-[75%] ${isMe ? 'items-end' : 'items-start'} flex flex-col relative`}>
                          {!isMe && <span className="text-[10px] text-slate-500 ml-1 mb-1 font-bold">{senderInfo?.name}</span>}
                          
                          <div className={`flex items-center gap-1 ${isMe ? 'flex-row-reverse' : 'flex-row'}`}>
                            <div className={`px-4 py-2 text-sm shadow-sm ${isMe ? 'bg-blue-500 text-white rounded-2xl rounded-tr-sm' : 'bg-white text-slate-800 rounded-2xl rounded-tl-sm'}`}>
                              {msg.text && <div>{msg.text}</div>}
                              {msg.audioData && (
                                <audio controls src={msg.audioData} className="mt-1 h-8 max-w-[200px]" />
                              )}
                              {msg.imageData && (
                                <img src={msg.imageData} className="mt-1 rounded-xl max-w-full h-auto cursor-pointer" onClick={()=>window.open(msg.imageData)} />
                              )}
                            </div>
                            
                            {isMe && (
                              <div className="flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                {msg.text && <button onClick={()=>handleEditMsg(msg.id, msg.text)} className="p-1 bg-white/80 rounded-full text-slate-500 hover:text-blue-600 shadow-sm"><Icons.Edit /></button>}
                                <button onClick={()=>handleDeleteMsg(msg.id)} className="p-1 bg-white/80 rounded-full text-slate-500 hover:text-red-600 shadow-sm"><Icons.Trash /></button>
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    )
                  })}
                  <div ref={messagesEndRef} />
                </div>

                <div className="bg-white/80 backdrop-blur p-3 border-t border-white shrink-0 space-y-2 z-10">
                  <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                    {emojis.map(e => <button key={e} onClick={()=>setText(t => t+e)} className="text-2xl hover:scale-125 transition-transform active:scale-95">{e}</button>)}
                  </div>
                  <form onSubmit={handleSendText} className="flex gap-2 items-center">
                    <label className="text-slate-500 hover:text-blue-600 p-2 cursor-pointer transition-colors shrink-0">
                       <Icons.Image />
                       <input type="file" className="hidden" accept="image/*" onChange={handleChatImageUpload} />
                    </label>
                    <input value={text} onChange={e=>setText(e.target.value)} placeholder="说点什么吧..." className="flex-1 min-w-0 bg-white border border-slate-200 rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 shadow-inner" />
                    
                    <button type="button" onClick={isRecording ? stopRecording : startRecording} className={`rounded-full p-2 w-10 h-10 flex items-center justify-center shrink-0 shadow transition-colors ${isRecording ? 'bg-red-500 text-white animate-pulse' : 'bg-green-500 text-white hover:bg-green-600'}`}>
                      {isRecording ? <Icons.Square /> : <Icons.Mic />}
                    </button>
                    <button type="submit" className="bg-blue-600 text-white rounded-full p-2 w-10 h-10 flex items-center justify-center shrink-0 shadow hover:bg-blue-700 transition-colors">
                      <Icons.Message />
                    </button>
                  </form>
                </div>
             </div>
          )
        }

        // --- 首页视图 ---
        function HomeView({ childrenList, tuitions, isAdmin, bills, currentMonthStr, teachers, attendance, db, onEditTuition }) {
          const today = new Date();
          const todayIso = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
          
          const handleQuickMark = async (tuitionId, subName) => {
            const key = `${tuitionId}_${subName}`;
            const rec = attendance.find(a => a.attendanceKey === key && a.month === currentMonthStr);
            const dr = rec ? { ...rec.dateRecords } : {};
            dr[todayIso] = { status: 'attended', reason: '' };
            if (rec) await db.collection('attendance').doc(rec.id).update({ dateRecords: dr });
            else await db.collection('attendance').add({ attendanceKey: key, tuitionId, subName, month: currentMonthStr, dateRecords: dr });
          };

          const adminStats = useMemo(() => {
            if (!isAdmin) return null;
            let own = 0, neph = 0;
            const unpaid = bills.filter(b => b.month === currentMonthStr && b.status === 'unpaid');
            bills.filter(b => b.month === currentMonthStr).forEach(b => {
              const c = childrenList.find(x => x.id === b.childId);
              if (c?.type === 'own') own += (Number(b.amount) || 0);
              else neph += (Number(b.amount) || 0);
            });
            return { own, neph, unpaidCount: unpaid.length };
          }, [isAdmin, bills, currentMonthStr, childrenList]);

          const replayNeeded = useMemo(() => {
             const list = [];
             attendance.forEach(a => {
                if (a.dateRecords) {
                   Object.keys(a.dateRecords).forEach(date => {
                      if (a.dateRecords[date].status === 'missed') {
                         const cName = childrenList.find(c => c.id === tuitions.find(t=>t.id===a.tuitionId)?.childId)?.name || '同学';
                         list.push({ id: a.id, sub: a.subName, date, child: cName, tid: a.tuitionId });
                      }
                   });
                }
             });
             return list.sort((a,b) => b.date.localeCompare(a.date));
          }, [attendance, childrenList, tuitions]);

          const todaysTuitions = [];
          tuitions.forEach(t => {
            if (t.activeMonth === currentMonthStr || t.feeType === 'package' || !t.activeMonth) {
              const list = t.subjectList || [{ name: t.subjects || '旧科目', schedules: [{type:t.scheduleType||'fixed', dayOfWeek:t.dayOfWeek||'1', time:t.time||'14:00', customDate:t.customDate, customTime:t.customTime}] }];
              list.forEach(sub => {
                sub.schedules?.forEach(s => {
                  if ((s.type === 'fixed' && parseInt(s.dayOfWeek) === today.getDay()) || (s.type === 'custom' && s.customDate === todayIso)) {
                    const rec = attendance.find(a => a.attendanceKey === `${t.id}_${sub.name}` && a.month === currentMonthStr);
                    const status = rec?.dateRecords?.[todayIso]?.status;
                    // 取消(cancelled)或者已补(attended)的都不显示在首页提醒
                    if (status !== 'attended' && status !== 'cancelled') {
                       todaysTuitions.push({ tid: t.id, subName: sub.name, childId: t.childId, time: s.type==='fixed'?s.time:s.customTime });
                    }
                  }
                });
              });
            }
          });

          return (
            <div className="space-y-6">
              {isAdmin && adminStats?.unpaidCount > 0 && today.getDate() >= 5 && (
                <div className="bg-rose-500 text-white p-5 rounded-[28px] font-black animate-pulse shadow-xl">
                  ⚠️ 本月有 {adminStats.unpaidCount} 笔补习费还没付！
                </div>
              )}

              {replayNeeded.length > 0 && (
                <div className="bg-amber-100 border-2 border-amber-300 p-5 rounded-[32px] shadow-sm">
                   <h2 className="text-amber-800 font-black mb-3 flex items-center gap-2"><Icons.Play /> 📺 待看回播提醒 ({replayNeeded.length})</h2>
                   <div className="space-y-2 max-h-40 overflow-y-auto no-scrollbar">
                      {replayNeeded.map((it, idx) => (
                        <div key={idx} className="bg-white/80 p-3 rounded-xl flex justify-between items-center text-sm">
                           <span className="font-bold text-amber-900">{it.child}: {it.date.split('-').slice(1).join('/')} {it.sub}</span>
                           <span className="text-amber-600 italic text-[10px]">去打卡页标记回播</span>
                        </div>
                      ))}
                   </div>
                </div>
              )}

              <div className="bg-gradient-to-br from-blue-500 to-blue-700 p-6 rounded-[32px] text-white shadow-xl relative">
                <h2 className="text-2xl font-black mb-4">📅 今日补习 (待打卡)</h2>
                {todaysTuitions.length > 0 ? todaysTuitions.map((it, i) => (
                  <div key={i} className="bg-white/20 backdrop-blur-md p-4 rounded-2xl mb-3 border border-white/30 flex justify-between items-center">
                    <div>
                      <div className="font-bold text-lg flex items-center gap-2">
                         {childrenList.find(c=>c.id===it.childId)?.name}：{it.subName}
                         {isAdmin && <button onClick={() => onEditTuition(it.tid)} className="text-white/40 hover:text-white"><Icons.Edit /></button>}
                      </div>
                      <div className="text-sm font-black opacity-90">⏰ {it.time}</div>
                    </div>
                    <button onClick={()=>handleQuickMark(it.tid, it.subName)} className="bg-white text-blue-600 px-5 py-2 rounded-xl font-black shadow-lg text-sm">快捷打卡</button>
                  </div>
                )) : <p className="opacity-90 font-bold bg-white/10 p-4 rounded-xl text-center">今天没有漏下的课！🎉</p>}
              </div>

              {isAdmin && adminStats && (
                <div className="grid grid-cols-2 gap-4">
                  <div className="bg-white p-6 rounded-[28px] border-2 border-blue-50 shadow-sm">
                    <div className="text-blue-500 text-xs font-bold mb-1">儿子女儿</div>
                    <div className="text-2xl font-black text-slate-800">RM {adminStats.own.toFixed(2)}</div>
                  </div>
                  <div className="bg-white p-6 rounded-[28px] border-2 border-purple-50 shadow-sm">
                    <div className="text-purple-500 text-xs font-bold mb-1">侄子侄女</div>
                    <div className="text-2xl font-black text-slate-800">RM {adminStats.neph.toFixed(2)}</div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        function AttendanceView({ childrenList, tuitions, attendance, currentMonthStr, db }) {
          const getDatesForSub = (sub) => {
            const [y, m] = currentMonthStr.split('-').map(Number);
            const dim = new Date(y, m, 0).getDate();
            const dates = [];
            sub.schedules?.forEach(s => {
              if (s.type === 'fixed') {
                for (let d = 1; d <= dim; d++) {
                  if (new Date(y, m-1, d).getDay() === parseInt(s.dayOfWeek)) dates.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
                }
              } else if (s.type === 'custom' && s.customDate?.startsWith(currentMonthStr)) dates.push(s.customDate);
            });
            return [...new Set(dates)].sort();
          };

          const handleCycleMark = async (tId, subName, dStr, cur) => {
            let next, reason = "";
            if (!cur) { next = 'attended'; } 
            else if (cur === 'attended') { next = 'missed'; reason = prompt("请输入缺席原因：") || "未注明"; } 
            else if (cur === 'missed') { next = 'replay'; } 
            else if (cur === 'replay') { next = 'cancelled'; } 
            else { next = null; }

            const key = `${tId}_${subName}`;
            const rec = attendance.find(a => a.attendanceKey === key && a.month === currentMonthStr);
            const dr = rec ? { ...rec.dateRecords } : {};
            if (next) dr[dStr] = { status: next, reason }; else delete dr[dStr];
            if (rec) await db.collection('attendance').doc(rec.id).update({ dateRecords: dr });
            else await db.collection('attendance').add({ attendanceKey: key, tuitionId: tId, subName, month: currentMonthStr, dateRecords: dr });
          };

          return (
            <div className="space-y-6">
              <h2 className="text-2xl font-black text-slate-800">打卡记事本</h2>
              <p className="text-[10px] text-slate-500 bg-white p-2 rounded-lg inline-block border shadow-sm">
                💡 循环：待补 ➡️ <span className="text-green-600 font-bold">已补</span> ➡️ <span className="text-rose-600 font-bold">缺席</span> ➡️ <span className="text-purple-600 font-bold">回播</span> ➡️ <span className="text-slate-800 font-bold">取消</span>
              </p>
              {childrenList.map(child => {
                const childT = tuitions.filter(t => t.childId === child.id && (t.activeMonth === currentMonthStr || t.feeType === 'package' || !t.activeMonth));
                if (!childT.length) return null;
                return (
                  <div key={child.id} className="bg-white border-2 rounded-[32px] overflow-hidden shadow-sm" style={{borderColor: child.color}}>
                    <div className="p-4 text-xl font-bold text-white flex justify-between items-center" style={{backgroundColor: child.color}}>
                       {child.name}
                       <span className="text-[10px] opacity-70">点击日期切换</span>
                    </div>
                    <div className="p-4 space-y-4">
                      {childT.map(t => {
                        const list = t.subjectList || [{ name: t.subjects || '旧数据', schedules: [] }];
                        return list.map(sub => {
                          const dates = getDatesForSub(sub);
                          const rec = attendance.find(a => a.attendanceKey === `${t.id}_${sub.name}` && a.month === currentMonthStr);
                          return (
                            <div key={sub.name} className="border-b pb-4 last:border-0">
                              <div className="font-bold text-slate-600 mb-2">📚 {sub.name}</div>
                              <div className="flex flex-wrap gap-2">
                                {dates.map(d => {
                                  const st = rec?.dateRecords?.[d] || { status: null };
                                  const colors = {
                                     attended: 'bg-green-500 text-white border-transparent',
                                     missed: 'bg-rose-500 text-white border-transparent',
                                     replay: 'bg-purple-600 text-white border-transparent',
                                     cancelled: 'bg-slate-700 text-white border-transparent',
                                     default: 'bg-slate-100 text-slate-400 border-slate-200'
                                  };
                                  const bg = colors[st.status] || colors.default;
                                  return (
                                    <button key={d} onClick={() => handleCycleMark(t.id, sub.name, d, st.status)} className={`p-2 rounded-xl text-center min-w-[64px] border-2 transition-all active:scale-95 ${bg}`}>
                                      <div className="text-[10px] opacity-80">{d.split('-')[2]}日</div>
                                      <div className="font-black text-xs">
                                         {st.status==='attended'?'已补':st.status==='missed'?'缺席':st.status==='replay'?'回播':st.status==='cancelled'?'取消':'待补'}
                                      </div>
                                    </button>
                                  );
                                })}
                              </div>
                            </div>
                          )
                        })
                      })}
                    </div>
                  </div>
                )
              })}
            </div>
          );
        }

        function TuitionManager({ childrenList, teachers, tuitions, currentMonthStr, db, editTuitionId, setEditTuitionId }) {
          const [form, setForm] = useState({
            teacherId: '', childId: '', feeAmount: '', feeType: 'monthly', activeMonth: currentMonthStr,
            subjectList: [{ name: '', schedules: [{ id: Math.random(), type: 'fixed', dayOfWeek: '1', time: '14:00', customDate: '', customTime: '14:00' }] }]
          });
          useEffect(() => {
            if (editTuitionId) {
                const t = tuitions.find(x => x.id === editTuitionId);
                if (t) {
                   const list = t.subjectList || [{ name: t.subjects || '旧科目', schedules: [{type:t.scheduleType||'fixed', dayOfWeek:t.dayOfWeek||'1', time:t.time||'14:00', customDate:t.customDate, customTime:t.customTime}] }];
                   setForm({ teacherId: t.teacherId, childId: t.childId, feeAmount: t.feeAmount, feeType: t.feeType || 'monthly', activeMonth: t.activeMonth || currentMonthStr, subjectList: list });
                }
            }
          }, [editTuitionId, tuitions, currentMonthStr]);
          
          const handleCopyPrevious = () => {
             const prevMonthStr = `${new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1).getFullYear()}-${String(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1).getMonth() + 1).padStart(2, '0')}`;
             const prevTuitions = tuitions.filter(t => t.activeMonth === prevMonthStr || !t.activeMonth);
             if (prevTuitions.length === 0) { alert("没有找到上个月的数据！"); return; }
             if (confirm(`找到了 ${prevTuitions.length} 条数据，确定复制到本月吗？`)) {
                 prevTuitions.forEach(t => {
                     const newData = { ...t, activeMonth: currentMonthStr };
                     delete newData.id;
                     db.collection('tuitions').add(newData);
                 });
                 alert("复制成功！");
             }
          };

          const handleSave = async (e) => {
            e.preventDefault();
            if (editTuitionId) await db.collection('tuitions').doc(editTuitionId).update(form);
            else await db.collection('tuitions').add(form);
            setForm({ teacherId:'', childId:'', feeAmount:'', feeType:'monthly', activeMonth: currentMonthStr, subjectList:[{ name:'', schedules:[{ id:Math.random(), type:'fixed', dayOfWeek:'1', time:'14:00', customDate:'', customTime:'14:00' }] }] });
            setEditTuitionId(null);
            alert("配置已存档！");
          };
          const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
          const sortedTuitions = [...tuitions].sort((a,b)=> (b.activeMonth || '').localeCompare(a.activeMonth || ''));

          return (
            <div className="space-y-6">
              <div className="bg-blue-600 text-white p-6 rounded-[32px] border-4 border-white shadow-xl">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-2xl font-black">{editTuitionId ? '📝 修改配置' : '设定科目时间'}</h2>
                  {!editTuitionId && <button onClick={handleCopyPrevious} type="button" className="text-xs bg-white/20 px-3 py-1 rounded-full hover:bg-white/40">复制上月排课</button>}
                </div>
                <form onSubmit={handleSave} className="space-y-4">
                  <div className="grid grid-cols-2 gap-2">
                    <select required value={form.teacherId} onChange={e=>setForm({...form, teacherId:e.target.value})} className="p-3 rounded-xl text-slate-800 font-bold"><option value="">- 老师 -</option>{teachers.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select>
                    <select required value={form.childId} onChange={e=>setForm({...form, childId:e.target.value})} className="p-3 rounded-xl text-slate-800 font-bold"><option value="">- 同学 -</option>{childrenList.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
                  </div>
                  <div className="flex gap-2">
                    <input type="month" value={form.activeMonth} onChange={e=>setForm({...form, activeMonth:e.target.value})} className="flex-1 p-3 rounded-xl text-slate-800 font-bold" />
                    <input placeholder="RM (可选)" type="number" step="0.01" value={form.feeAmount} onChange={e=>setForm({...form, feeAmount:e.target.value})} className="w-28 p-3 rounded-xl text-slate-800 font-black" />
                  </div>
                  {form.subjectList.map((sub, sIdx) => (
                    <div key={sIdx} className="bg-white/10 p-4 rounded-2xl border border-white/20 relative">
                      <button type="button" onClick={()=>setForm({...form, subjectList: form.subjectList.filter((_,i)=>i!==sIdx)})} className="absolute -top-2 -right-2 bg-red-500 text-white w-8 h-8 rounded-full font-bold shadow">X</button>
                      <input required value={sub.name} onChange={e=>{const nl=[...form.subjectList]; nl[sIdx].name=e.target.value; setForm({...form, subjectList: nl})}} placeholder="科目名称" className="w-full p-2 rounded-lg text-slate-800 font-bold mb-3" />
                      {sub.schedules.map((sc, schIdx) => (
                        <div key={schIdx} className="flex gap-2 mb-2">
                           <select value={sc.type} onChange={e=>{const nl=[...form.subjectList]; nl[sIdx].schedules[schIdx].type=e.target.value; setForm({...form, subjectList: nl})}} className="p-1 rounded bg-white text-slate-800 text-xs font-bold"><option value="fixed">每周</option><option value="custom">特定</option></select>
                           {sc.type==='fixed' ? (
                             <><select value={sc.dayOfWeek} onChange={e=>{const nl=[...form.subjectList]; nl[sIdx].schedules[schIdx].dayOfWeek=e.target.value; setForm({...form, subjectList: nl})}} className="flex-1 p-1 rounded bg-white text-slate-800 text-xs">{days.map((d,i)=><option key={i} value={i}>{d}</option>)}</select>
                             <input type="time" value={sc.time} onChange={e=>{const nl=[...form.subjectList]; nl[sIdx].schedules[schIdx].time=e.target.value; setForm({...form, subjectList: nl})}} className="w-20 p-1 rounded bg-white text-slate-800 text-xs font-bold" /></>
                           ) : (
                             <><input type="date" value={sc.customDate} onChange={e=>{const nl=[...form.subjectList]; nl[sIdx].schedules[schIdx].customDate=e.target.value; setForm({...form, subjectList: nl})}} className="flex-1 p-1 rounded bg-white text-slate-800 text-xs" />
                             <input type="time" value={sc.customTime} onChange={e=>{const nl=[...form.subjectList]; nl[sIdx].schedules[schIdx].customTime=e.target.value; setForm({...form, subjectList: nl})}} className="w-20 p-1 rounded bg-white text-slate-800 text-xs font-bold" /></>
                           )}
                        </div>
                      ))}
                      <button type="button" onClick={()=>{const nl=[...form.subjectList]; nl[sIdx].schedules.push({id:Math.random(),type:'fixed',dayOfWeek:'1',time:'14:00',customDate:'',customTime:'14:00'}); setForm({...form, subjectList:nl})}} className="text-[10px] underline">+ 增加时间段</button>
                    </div>
                  ))}
                  <button type="button" onClick={()=>setForm({...form, subjectList:[...form.subjectList, {name:'', schedules:[{id:Math.random(),type:'fixed',dayOfWeek:'1',time:'14:00',customDate:'',customTime:'14:00'}]}]})} className="w-full py-4 border-2 border-dashed border-white/40 rounded-2xl font-bold text-white">+ 增加新科目</button>
                  <div className="flex gap-2">
                    <button type="submit" className="flex-1 py-4 bg-white text-blue-600 rounded-2xl font-black text-xl shadow-lg">确认保存配置</button>
                    {editTuitionId && <button type="button" onClick={() => { setEditTuitionId(null); setForm({ teacherId:'', childId:'', feeAmount:'', feeType:'monthly', activeMonth: currentMonthStr, subjectList:[{ name:'', schedules:[{ id:Math.random(), type:'fixed', dayOfWeek:'1', time:'14:00', customDate:'', customTime:'14:00' }] }] }); }} className="p-4 bg-white/20 text-white rounded-2xl font-bold">取消</button>}
                  </div>
                </form>
              </div>

              <div className="bg-white p-6 rounded-[32px] border shadow-sm">
                <h3 className="text-slate-400 font-bold uppercase text-xs tracking-widest mb-4">当前及历史科目列表</h3>
                {sortedTuitions.map(t => {
                  const list = t.subjectList || [{ name: t.subjects || '旧科目', schedules: [{type:t.scheduleType||'fixed', dayOfWeek:t.dayOfWeek||'1', time:t.time||'14:00', customDate:t.customDate, customTime:t.customTime}] }];
                  return (
                    <div key={t.id} className="p-4 border-b last:border-0 flex justify-between items-center">
                      <div>
                        <div className="text-xs text-blue-500 font-bold">{t.activeMonth || '未指定月份 (旧数据)'}</div>
                        <div className="font-black text-slate-800">{childrenList.find(c=>c.id===t.childId)?.name} - {list.map(s=>s.name).join(', ')}</div>
                        <div className="text-[10px] text-slate-400">{teachers.find(tr=>tr.id===t.teacherId)?.name}老师 | {t.feeAmount ? `RM ${t.feeAmount}` : '费用待定'}</div>
                      </div>
                      <div className="flex gap-2">
                         <button onClick={()=>{setEditTuitionId(t.id); window.scrollTo(0,0)}} className="p-2 text-blue-600"><Icons.Edit /></button>
                         <button onClick={async()=>{if(confirm("确定删除？")) await db.collection('tuitions').doc(t.id).delete()}} className="p-2 text-rose-600"><Icons.Trash /></button>
                      </div>
                    </div>
                  )
                })}
              </div>
            </div>
          );
        }

        function CalendarView({ childrenList, tuitions }) {
          const [v, setV] = useState(new Date());
          const dim = new Date(v.getFullYear(), v.getMonth()+1, 0).getDate();
          const fd = new Date(v.getFullYear(), v.getMonth(), 1).getDay();
          const ds = []; for(let i=0; i<fd; i++) ds.push(null); for(let i=1; i<=dim; i++) ds.push(i);
          const getE = (d) => {
            if(!d) return [];
            const dobj = new Date(v.getFullYear(), v.getMonth(), d);
            const dow = dobj.getDay();
            const iso = new Date(dobj.getTime() - (dobj.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            const es = [];
            tuitions.forEach(t => {
              const list = t.subjectList || [{ name: t.subjects || '旧科目', schedules: [{type:t.scheduleType||'fixed', dayOfWeek:t.dayOfWeek||'1', time:t.time||'14:00', customDate:t.customDate, customTime:t.customTime}] }];
              list.forEach(sub => {
                sub.schedules?.forEach(s => {
                  if((s.type==='fixed' && parseInt(s.dayOfWeek)===dow) || (s.type==='custom' && s.customDate===iso)) {
                    es.push({c:childrenList.find(x=>x.id===t.childId), n:sub.name, t:s.type==='fixed'?s.time:s.customTime});
                  }
                });
              });
            });
            return es;
          };
          return (
            <div className="bg-white p-6 rounded-[32px] shadow-sm border">
              <div className="flex justify-between items-center mb-6">
                <button onClick={()=>setV(new Date(v.getFullYear(), v.getMonth()-1, 1))} className="p-3 bg-slate-100 rounded-xl font-bold">◀</button>
                <h2 className="text-xl font-black text-slate-800">{v.getFullYear()}年 {v.getMonth()+1}月</h2>
                <button onClick={()=>setV(new Date(v.getFullYear(), v.getMonth()+1, 1))} className="p-3 bg-slate-100 rounded-xl font-bold">▶</button>
              </div>
              <div className="grid grid-cols-7 gap-1 text-center font-bold text-slate-400 text-xs mb-2">
                {['日','一','二','三','四','五','六'].map(d=><div key={d}>{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-1">
                {ds.map((d,i)=>(
                  <div key={i} className={`min-h-[70px] p-1 border rounded-2xl ${d?'bg-white':'bg-transparent border-transparent'}`}>
                    {d && <div className="text-slate-300 text-xs font-bold">{d}</div>}
                    {getE(d).map((e,idx)=><div key={idx} className="text-[8px] p-0.5 mb-0.5 rounded text-white font-bold truncate" style={{backgroundColor:e.c?.color}}>{e.t} {e.c?.name}</div>)}
                  </div>
                ))}
              </div>
            </div>
          );
        }

        function PaymentManager({ childrenList, tuitions, teachers, bills, currentMonthStr, db }) {
          const handlePay = async (id) => await db.collection('bills').doc(id).update({ status: 'paid' });
          const handleUnpay = async (id) => await db.collection('bills').doc(id).update({ status: 'unpaid', receiptData: null });
          const handleUpload = async (e, id) => {
             const b64 = await compressImage(e.target.files[0]);
             await db.collection('bills').doc(id).update({ receiptData: b64 });
          };
          const handleEditBill = async (billId, oldAmount) => {
            const newAmount = prompt("请输入新的金额 (RM):", oldAmount || "");
            if (newAmount !== null && newAmount !== "") {
              await db.collection('bills').doc(billId).update({ amount: newAmount });
            }
          };
          const handleDeleteBill = async (billId) => {
            if(confirm("确定要彻底删除这笔账单吗？")) await db.collection('bills').doc(billId).delete();
          };

          return (
            <div className="space-y-6">
              <h2 className="text-2xl font-black text-slate-800">财务管理</h2>
              {teachers.map(tr => {
                const bils = bills.filter(b => b.teacherId === tr.id && b.month === currentMonthStr);
                if(!bils.length) return null;
                return (
                  <div key={tr.id} className="bg-white p-5 rounded-[32px] border">
                    <h3 className="text-lg font-black mb-4">👨‍🏫 {tr.name} 老师</h3>
                    {bils.map(b => {
                      const child = childrenList.find(x => x.id === b.childId);
                      const tInfo = tuitions.find(t => t.id === b.tuitionId);
                      const subjectsStr = tInfo?.subjectList ? tInfo.subjectList.map(s=>s.name).join(' + ') : (tInfo?.subjects || '补习');

                      return (
                        <div key={b.id} className={`p-4 rounded-2xl border-2 mb-3 flex flex-col md:flex-row justify-between items-start md:items-center ${b.status==='paid'?'bg-green-50 border-green-200':'bg-rose-50 border-rose-200'}`}>
                          <div className="w-full flex justify-between items-start">
                            <div>
                              <div className="font-black text-xl" style={{color:child?.color || '#94a3b8'}}>{child?.name || '已删除学生'}</div>
                              <div className="text-sm font-bold text-slate-400">{subjectsStr}</div>
                              <div className="text-2xl font-black text-slate-800 mt-1">{b.amount ? `RM ${b.amount}` : '待定'}</div>
                            </div>
                            <div className="flex gap-2">
                               <button onClick={() => handleEditBill(b.id, b.amount)} className="p-2 bg-white border rounded-lg text-slate-500 shadow-sm hover:bg-slate-100"><Icons.Edit /></button>
                               <button onClick={() => handleDeleteBill(b.id)} className="p-2 bg-white border rounded-lg text-rose-500 shadow-sm hover:bg-rose-50"><Icons.Trash /></button>
                            </div>
                          </div>
                          
                          <div className="flex gap-2 mt-4 md:mt-0 w-full md:w-auto justify-end border-t pt-4 md:border-t-0 md:pt-0">
                             {b.status === 'paid' ? (
                               <><span className="text-green-600 font-bold flex items-center">✅ 已付</span>
                               {b.receiptData && <img src={b.receiptData} className="w-12 h-12 rounded border" onClick={()=>window.open(b.receiptData)} />}
                               <button onClick={()=>handleUnpay(b.id)} className="text-xs text-slate-400 underline">撤销</button></>
                             ) : (
                               <><label className="bg-slate-200 px-4 py-2 rounded-xl cursor-pointer font-bold text-slate-600">单据<input type="file" className="hidden" onChange={e=>handleUpload(e,b.id)} /></label>
                               <button onClick={()=>handlePay(b.id)} className="bg-rose-500 text-white px-6 py-2 rounded-xl font-bold shadow-lg">确认已付</button></>
                             )}
                          </div>
                        </div>
                      )
                    })}
                  </div>
                )
              })}
            </div>
          );
        }

        function ChildrenManager({ childrenList, db }) {
          const [n, setN] = useState('');
          const [t, setT] = useState('own');
          const [c, setC] = useState('#3B82F6');
          const cols = ['#EF4444', '#F97316', '#F59E0B', '#10B981', '#3B82F6', '#8B5CF6', '#EC4899'];
          return (
            <div className="space-y-6">
              <div className="bg-white p-6 rounded-[32px] border shadow-sm">
                <input value={n} onChange={e=>setN(e.target.value)} placeholder="名字" className="w-full p-4 border-2 rounded-2xl mb-4 font-bold text-lg" />
                <div className="flex gap-2 mb-4">
                  <button onClick={()=>setT('own')} className={`flex-1 p-3 rounded-xl font-bold ${t==='own'?'bg-blue-600 text-white':'bg-slate-100 text-slate-400'}`}>儿女</button>
                  <button onClick={()=>setT('nephew')} className={`flex-1 p-3 rounded-xl font-bold ${t==='nephew'?'bg-purple-600 text-white':'bg-slate-100 text-slate-400'}`}>侄儿女</button>
                </div>
                <div className="flex gap-2 flex-wrap mb-6">{cols.map(cl=><div key={cl} onClick={()=>setC(cl)} className={`w-10 h-10 rounded-full border-4 ${c===cl?'border-black scale-110':'border-transparent'}`} style={{backgroundColor:cl}}></div>)}</div>
                <button onClick={async ()=>{if(n){await db.collection('children').add({name:n, color:c, type:t});setN('')}}} className="w-full py-4 bg-slate-800 text-white rounded-2xl font-black">保存名单</button>
              </div>
              <div className="grid grid-cols-2 gap-4">
                {childrenList.map(ch=><div key={ch.id} className="p-4 rounded-[28px] text-white font-black text-center shadow-lg" style={{backgroundColor:ch.color}}>{ch.name}<button onClick={()=>db.collection('children').doc(ch.id).delete()} className="block mx-auto mt-2 text-[8px] bg-black/20 p-1 rounded">删除</button></div>)}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
