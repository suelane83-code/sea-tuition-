<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海底补习记(云端同步版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Firebase 配置 (请保持您原本的配置) ---
        const firebaseConfig = {
          apiKey: "AIzaSyCtw29Kz1An1PjIpI1lFCPUCjOsGGZTaAA",
          authDomain: "seatuition-2.firebaseapp.com",
          projectId: "seatuition-2",
          storageBucket: "seatuition-2.firebasestorage.app",
          messagingSenderId: "1081496173041",
          appId: "1:1081496173041:web:7cfe63d1eec0f77290ec50",
          measurementId: "G-FM41SK8LXH"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- Utility: 图片压缩 ---
        const compressImage = (file) => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
              const img = new Image(); img.src = event.target.result;
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500; let width = img.width; let height = img.height;
                if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.6)); 
              };
            };
          });
        };

        const Icons = {
          Home: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
          Calendar: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
          Users: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>,
          Book: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>,
          Check: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
          CreditCard: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>,
          Edit: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 Z"/></svg>,
          Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
          Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        };

        function App() {
          const [ready, setReady] = useState(false);
          const [activeTab, setActiveTab] = useState('dashboard');
          const [currentDate] = useState(new Date());
          const currentMonthStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;

          const [childrenList, setChildren] = useState([]);
          const [teachers, setTeachers] = useState([]);
          const [tuitions, setTuitions] = useState([]);
          const [bills, setBills] = useState([]);
          const [attendance, setAttendance] = useState([]);

          useEffect(() => {
            auth.signInAnonymously();
            const unsubAuth = auth.onAuthStateChanged(user => { if(user) setReady(true); });
            return () => unsubAuth();
          }, []);

          useEffect(() => {
            if (!ready) return;
            const unsubs = [
              db.collection('children').onSnapshot(snap => setChildren(snap.docs.map(d => ({id: d.id, ...d.data()})))),
              db.collection('teachers').onSnapshot(snap => setTeachers(snap.docs.map(d => ({id: d.id, ...d.data()})))),
              db.collection('tuitions').onSnapshot(snap => setTuitions(snap.docs.map(d => ({id: d.id, ...d.data()})))),
              db.collection('bills').onSnapshot(snap => setBills(snap.docs.map(d => ({id: d.id, ...d.data()})))),
              db.collection('attendance').onSnapshot(snap => setAttendance(snap.docs.map(d => ({id: d.id, ...d.data()})))),
            ];
            return () => unsubs.forEach(fn => fn());
          }, [ready]);

          useEffect(() => {
            if (!ready || tuitions.length === 0) return;
            tuitions.forEach(t => {
              const billExists = bills.some(b => b.tuitionId === t.id && b.month === currentMonthStr);
              if (!billExists) {
                db.collection('bills').add({
                  tuitionId: t.id, teacherId: t.teacherId, childId: t.childId,
                  month: currentMonthStr, amount: t.feeAmount, status: 'unpaid', createdAt: Date.now()
                });
              }
            });
          }, [ready, tuitions, currentMonthStr, bills]);

          if (!ready) return <div className="text-2xl text-center p-10 font-bold text-white mt-20">🌊 海底补习系统中...</div>;

          const tabs = [
            { id: 'dashboard', label: '首页', icon: <Icons.Home /> },
            { id: 'calendar', label: '日历', icon: <Icons.Calendar /> },
            { id: 'attendance', label: '打卡', icon: <Icons.Check /> },
            { id: 'payments', label: '付款', icon: <Icons.CreditCard /> },
            { id: 'tuitions', label: '科目时间', icon: <Icons.Book /> },
            { id: 'children', label: '孩子', icon: <Icons.Users /> },
          ];

          return (
            <div className="min-h-screen pb-20 bg-sky-400">
              <style>{`
                body { font-family: 'Segoe UI', sans-serif; }
                .content-card { background: rgba(255, 255, 255, 0.95); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; }
                .tab-active { background: #3b82f6; color: white; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(59,130,246,0.4); }
              `}</style>
              
              <div className="bg-white/90 sticky top-0 z-50 px-2 py-3 flex overflow-x-auto gap-2 shadow-md no-scrollbar">
                {tabs.map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-shrink-0 flex items-center gap-2 px-5 py-3 rounded-2xl font-bold text-lg transition-all ${activeTab === tab.id ? 'tab-active' : 'bg-sky-100 text-sky-800'}`}>
                    {tab.icon} {tab.label}
                  </button>
                ))}
              </div>

              <div className="max-w-4xl mx-auto p-4 mt-2">
                {activeTab === 'dashboard' && <Dashboard childrenList={childrenList} tuitions={tuitions} bills={bills} currentMonthStr={currentMonthStr} teachers={teachers} />}
                {activeTab === 'calendar' && <CalendarView childrenList={childrenList} tuitions={tuitions} />}
                {activeTab === 'attendance' && <AttendanceManager childrenList={childrenList} tuitions={tuitions} attendance={attendance} currentMonthStr={currentMonthStr} />}
                {activeTab === 'payments' && <PaymentManager childrenList={childrenList} tuitions={tuitions} teachers={teachers} bills={bills} currentMonthStr={currentMonthStr} />}
                {activeTab === 'tuitions' && <TuitionManager childrenList={childrenList} teachers={teachers} tuitions={tuitions} />}
                {activeTab === 'children' && <ChildrenManager childrenList={childrenList} />}
              </div>
            </div>
          );
        }

        // --- DASHBOARD ---
        function Dashboard({ childrenList, tuitions, currentMonthStr, teachers }) {
          const today = new Date();
          const todayDayOfWeek = today.getDay();
          const todayIso = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
          
          const todaysTuitions = [];
          tuitions.forEach(t => {
            t.subjectList?.forEach(sub => {
              sub.schedules?.forEach(s => {
                if ((s.type === 'fixed' && parseInt(s.dayOfWeek) === todayDayOfWeek) || (s.type === 'custom' && s.customDate === todayIso)) {
                  todaysTuitions.push({ teacherId: t.teacherId, childId: t.childId, subName: sub.name, time: s.type === 'fixed' ? s.time : s.customTime });
                }
              });
            });
          });
          todaysTuitions.sort((a,b) => a.time.localeCompare(b.time));

          return (
            <div className="space-y-6">
              <div className="bg-yellow-100 border-l-8 border-yellow-500 p-6 rounded-2xl shadow">
                <h2 className="text-3xl font-bold mb-4 text-yellow-900">🐚 今日课表提醒</h2>
                {todaysTuitions.length > 0 ? (
                  <ul className="space-y-4">
                    {todaysTuitions.map((item, idx) => {
                      const child = childrenList.find(c => c.id === item.childId);
                      const teacher = teachers.find(teach => teach.id === item.teacherId);
                      return (
                        <li key={idx} className="bg-white/80 p-4 rounded-xl flex justify-between items-center border border-yellow-200 shadow-sm">
                          <div>
                            <span className="font-extrabold text-2xl" style={{color: child?.color}}>{child?.name}</span>
                            <span className="text-xl mx-2">上 {item.subName}</span>
                            <span className="text-gray-500">({teacher?.name} 老师)</span>
                          </div>
                          <span className="font-bold text-2xl text-blue-600">⏰ {item.time}</span>
                        </li>
                      );
                    })}
                  </ul>
                ) : <p className="text-xl text-yellow-700">今天很清静，没有补习哦！🍀</p>}
              </div>
            </div>
          );
        }

        // --- CALENDAR ---
        function CalendarView({ childrenList, tuitions }) {
          const [viewDate, setViewDate] = useState(new Date());
          const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
          const firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
          const days = []; for (let i = 0; i < firstDay; i++) days.push(null); for (let i = 1; i <= daysInMonth; i++) days.push(i);

          const getDayEvents = (day) => {
            if (!day) return [];
            const d = new Date(viewDate.getFullYear(), viewDate.getMonth(), day);
            const dow = d.getDay();
            const iso = new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            const events = [];
            tuitions.forEach(t => {
              const child = childrenList.find(c => c.id === t.childId);
              t.subjectList?.forEach(sub => {
                sub.schedules?.forEach(s => {
                  if ((s.type === 'fixed' && parseInt(s.dayOfWeek) === dow) || (s.type === 'custom' && s.customDate === iso)) {
                    events.push({ child, subName: sub.name, time: s.type === 'fixed' ? s.time : s.customTime });
                  }
                });
              });
            });
            return events;
          };

          return (
            <div className="content-card">
              <div className="flex justify-between items-center mb-6">
                <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1))} className="p-3 bg-blue-100 rounded-xl font-bold">上月</button>
                <h2 className="text-3xl font-bold text-blue-900">{viewDate.getFullYear()}年 {viewDate.getMonth() + 1}月</h2>
                <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1))} className="p-3 bg-blue-100 rounded-xl font-bold">下月</button>
              </div>
              <div className="grid grid-cols-7 gap-2 mb-2 text-center font-bold text-blue-700">
                {['日','一','二','三','四','五','六'].map(d => <div key={d}>{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-2">
                {days.map((day, idx) => (
                  <div key={idx} className={`min-h-[90px] p-1 border-2 rounded-xl ${day ? 'bg-white border-gray-100' : 'bg-transparent border-transparent'}`}>
                    {day && <div className="text-gray-400 font-bold mb-1">{day}</div>}
                    {getDayEvents(day).map((ev, i) => (
                      <div key={i} className="text-[10px] sm:text-xs p-1 mb-1 rounded text-white font-bold truncate" style={{backgroundColor: ev.child?.color}} title={ev.subName}>
                        {ev.time} {ev.child?.name}({ev.subName})
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          );
        }

        // --- ATTENDANCE ---
        function AttendanceManager({ childrenList, tuitions, attendance, currentMonthStr }) {
          const handleMark = async (tuitionId, subName, slotIdx, current) => {
            let next = current === 'attended' ? 'missed' : current === 'missed' ? null : 'attended';
            let note = next === 'missed' ? (prompt("缺席原因：") || "无原因") : "";
            const key = `${tuitionId}_${subName}`;
            const record = attendance.find(a => a.attendanceKey === key && a.month === currentMonthStr);
            if (record) {
              const newSlots = [...record.slots]; newSlots[slotIdx] = { status: next, note };
              await db.collection('attendance').doc(record.id).update({ slots: newSlots });
            } else {
              const newSlots = Array(12).fill({ status: null }); newSlots[slotIdx] = { status: next, note };
              await db.collection('attendance').add({ attendanceKey: key, tuitionId, subName, month: currentMonthStr, slots: newSlots });
            }
          };

          return (
            <div className="content-card">
              <h2 className="text-3xl font-bold mb-6 text-blue-900 border-b-2 pb-2">🐟 打卡记事本 ({currentMonthStr})</h2>
              {childrenList.map(child => {
                const childT = tuitions.filter(t => t.childId === child.id);
                if (!childT.length) return null;
                return (
                  <div key={child.id} className="mb-8 border-4 rounded-3xl overflow-hidden shadow-lg" style={{borderColor: child.color}}>
                    <div className="p-4 text-2xl font-extrabold text-white" style={{backgroundColor: child.color}}>{child.name}</div>
                    <div className="p-4 bg-white overflow-x-auto">
                      <table className="w-full text-lg">
                        <tbody>
                          {childT.map(t => (
                            t.subjectList?.map(sub => {
                              const att = attendance.find(a => a.attendanceKey === `${t.id}_${sub.name}` && a.month === currentMonthStr) || { slots: Array(12).fill({status:null}) };
                              return (
                                <tr key={sub.name} className="border-b">
                                  <td className="py-4 font-bold min-w-[120px]">{sub.name}</td>
                                  <td className="flex gap-1 p-2">
                                    {att.slots.map((slot, i) => (
                                      <button key={i} onClick={() => handleMark(t.id, sub.name, i, slot.status)} className={`w-10 h-10 rounded-lg flex-shrink-0 flex items-center justify-center font-bold text-white transition-all ${slot.status==='attended'?'bg-green-500':slot.status==='missed'?'bg-red-500':'bg-gray-100 text-gray-300'}`}>
                                        {slot.status === 'attended' ? '√' : slot.status === 'missed' ? 'X' : i+1}
                                      </button>
                                    ))}
                                  </td>
                                </tr>
                              );
                            })
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        }

        // --- PAYMENT ---
        function PaymentManager({ childrenList, tuitions, teachers, bills, currentMonthStr }) {
          const handlePay = async (id) => await db.collection('bills').doc(id).update({ status: 'paid' });
          const handleUnpay = async (id) => await db.collection('bills').doc(id).update({ status: 'unpaid', receiptData: null });
          const handleUpload = async (e, id) => {
            const file = e.target.files[0]; if(!file) return;
            const b64 = await compressImage(file); await db.collection('bills').doc(id).update({ receiptData: b64 });
          };

          return (
            <div className="content-card">
              <h2 className="text-3xl font-bold mb-6 text-blue-900">💰 补习费缴交 ({currentMonthStr})</h2>
              {teachers.map(teacher => {
                const tBills = bills.filter(b => b.teacherId === teacher.id && b.month === currentMonthStr);
                if (!tBills.length) return null;
                return (
                  <div key={teacher.id} className="mb-6 p-5 border-4 border-blue-200 rounded-3xl bg-white shadow-sm">
                    <h3 className="text-2xl font-bold mb-4 flex items-center gap-2"><span className="p-2 bg-blue-100 rounded-full">👨‍🏫</span> {teacher.name} 老师</h3>
                    <div className="space-y-4">
                      {tBills.map(bill => {
                        const child = childrenList.find(c => c.id === bill.childId);
                        const tuition = tuitions.find(t => t.id === bill.tuitionId);
                        return (
                          <div key={bill.id} className={`p-4 rounded-2xl border-2 flex flex-col md:flex-row justify-between items-center transition-all ${bill.status==='paid'?'bg-green-50 border-green-300':'bg-red-50 border-red-300'}`}>
                            <div className="text-left w-full">
                              <div className="text-2xl font-bold" style={{color: child?.color}}>{child?.name}</div>
                              <div className="text-gray-500 font-bold mb-1">科目：{tuition?.subjectList?.map(s => s.name).join(' + ')}</div>
                              <div className="text-3xl font-black">RM {bill.amount}</div>
                            </div>
                            <div className="flex gap-3 mt-4 md:mt-0 w-full md:w-auto justify-end">
                              {bill.status === 'paid' ? (
                                <>
                                  <span className="text-green-600 font-bold text-xl">✅ 已付</span>
                                  {bill.receiptData && <img src={bill.receiptData} className="w-14 h-14 rounded border cursor-pointer" onClick={() => window.open(bill.receiptData)} />}
                                  <button onClick={() => handleUnpay(bill.id)} className="text-gray-400 underline text-sm">重置</button>
                                </>
                              ) : (
                                <>
                                  <label className="bg-gray-200 px-4 py-2 rounded-xl cursor-pointer font-bold">单据<input type="file" className="hidden" onChange={e => handleUpload(e, bill.id)} /></label>
                                  <button onClick={() => handlePay(bill.id)} className="bg-red-500 text-white px-8 py-3 rounded-2xl font-bold text-xl shadow-lg">确认付款</button>
                                </>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          );
        }

        // --- TUITION MANAGER (核心修改) ---
        function TuitionManager({ childrenList, teachers, tuitions }) {
          const [teacherName, setTeacherName] = useState('');
          const [editId, setEditId] = useState(null);
          
          // 初始状态：含有一个空的科目
          const [form, setForm] = useState({
            teacherId: '', childId: '', feeAmount: '', feeType: 'monthly',
            subjectList: [{ name: '', schedules: [{ id: Math.random(), type: 'fixed', dayOfWeek: '1', time: '14:00', customDate: '', customTime: '14:00' }] }]
          });

          const addSubject = () => {
            setForm({...form, subjectList: [...form.subjectList, { name: '', schedules: [{ id: Math.random(), type: 'fixed', dayOfWeek: '1', time: '14:00', customDate: '', customTime: '14:00' }] }]});
          };

          const addSchedule = (subIdx) => {
            const newList = [...form.subjectList];
            newList[subIdx].schedules.push({ id: Math.random(), type: 'fixed', dayOfWeek: '1', time: '14:00', customDate: '', customTime: '14:00' });
            setForm({...form, subjectList: newList});
          };

          const handleSubmit = async (e) => {
            e.preventDefault();
            if (!form.teacherId || !form.childId) return alert("请选择老师和孩子");
            if (editId) await db.collection('tuitions').doc(editId).update(form);
            else await db.collection('tuitions').add(form);
            setForm({ teacherId: '', childId: '', feeAmount: '', feeType: 'monthly', subjectList: [{ name: '', schedules: [{ id: Math.random(), type: 'fixed', dayOfWeek: '1', time: '14:00', customDate: '', customTime: '14:00' }] }] });
            setEditId(null);
          };

          const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

          return (
            <div className="space-y-8">
              <div className="content-card">
                <h2 className="text-2xl font-bold mb-4 border-b pb-2">1. 登记补习老师</h2>
                <div className="flex gap-4">
                  <input value={teacherName} onChange={e=>setTeacherName(e.target.value)} placeholder="老师名字" className="flex-1 p-4 border-2 rounded-2xl text-xl" />
                  <button onClick={async ()=>{if(teacherName) await db.collection('teachers').add({name: teacherName}); setTeacherName('')}} className="bg-blue-600 text-white px-8 rounded-2xl font-bold">登记</button>
                </div>
              </div>

              <div className="content-card border-4 border-blue-500">
                <h2 className="text-3xl font-black mb-6 text-blue-900 border-b-4 border-blue-100 pb-2">{editId ? '📝 修改配置' : '🐚 2. 设定科目与上课时间'}</h2>
                <form onSubmit={handleSubmit} className="space-y-8">
                  <div className="grid grid-cols-2 gap-4">
                    <select required value={form.teacherId} onChange={e=>setForm({...form, teacherId: e.target.value})} className="p-4 border-2 rounded-2xl text-xl font-bold text-blue-800"><option value="">- 选老师 -</option>{teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}</select>
                    <select required value={form.childId} onChange={e=>setForm({...form, childId: e.target.value})} className="p-4 border-2 rounded-2xl text-xl font-bold"><option value="">- 选孩子 -</option>{childrenList.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
                  </div>

                  <div className="p-6 bg-yellow-100 rounded-3xl space-y-4 shadow-inner">
                    <h3 className="text-xl font-bold">账单设置 (一位老师收一笔钱)</h3>
                    <div className="flex gap-4">
                      <select value={form.feeType} onChange={e=>setForm({...form, feeType: e.target.value})} className="flex-1 p-4 border-2 rounded-2xl text-xl font-bold"><option value="monthly">每月收费</option><option value="package">配套收费</option></select>
                      <div className="flex-1 relative"><span className="absolute left-4 top-4 font-bold text-gray-400">RM</span><input placeholder="金额" type="number" step="0.01" value={form.feeAmount} onChange={e=>setForm({...form, feeAmount: e.target.value})} className="w-full p-4 pl-14 border-2 rounded-2xl text-2xl font-black text-red-600" /></div>
                    </div>
                  </div>

                  <div className="space-y-8">
                    {form.subjectList.map((sub, sIdx) => (
                      <div key={sIdx} className="p-6 bg-sky-50 border-2 border-sky-200 rounded-3xl relative animate-in slide-in-from-right duration-300">
                        <button type="button" onClick={() => setForm({...form, subjectList: form.subjectList.filter((_,i)=>i!==sIdx)})} className="absolute -top-3 -right-3 bg-red-500 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold shadow-lg">X</button>
                        <label className="block text-xl font-black text-sky-900 mb-4 flex items-center gap-2">📚 科目 {sIdx+1}：
                          <input required value={sub.name} onChange={e=>{const nl=[...form.subjectList]; nl[sIdx].name=e.target.value; setForm({...form, subjectList: nl})}} placeholder="输入科目 (如：国语)" className="flex-1 p-3 border-2 rounded-xl text-xl" />
                        </label>

                        <div className="space-y-3">
                          {sub.schedules.map((sched, schIdx) => (
                            <div key={sched.id} className="bg-white p-4 rounded-2xl flex flex-wrap gap-4 items-center border border-sky-100">
                              <select value={sched.type} onChange={e=>{const nl=[...form.subjectList]; nl[sIdx].schedules[schIdx].type=e.target.value; setForm({...form, subjectList: nl})}} className="p-2 border-2 rounded-xl font-bold">
                                <option value="fixed">每周固定</option><option value="custom">指定日期</option>
                              </select>
                              {sched.type === 'fixed' ? (
                                <div className="flex gap-2 flex-1">
                                  <select value={sched.dayOfWeek} onChange={e=>{const nl=[...form.subjectList]; nl[sIdx].schedules[schIdx].dayOfWeek=e.target.value; setForm({...form, subjectList: nl})}} className="flex-1 p-2 border-2 rounded-xl">{days.map((d,i)=><option key={i} value={i}>{d}</option>)}</select>
                                  <input type="time" value={sched.time} onChange={e=>{const nl=[...form.subjectList]; nl[sIdx].schedules[schIdx].time=e.target.value; setForm({...form, subjectList: nl})}} className="flex-1 p-2 border-2 rounded-xl font-bold" />
                                </div>
                              ) : (
                                <div className="flex gap-2 flex-1">
                                  <input type="date" value={sched.customDate} onChange={e=>{const nl=[...form.subjectList]; nl[sIdx].schedules[schIdx].customDate=e.target.value; setForm({...form, subjectList: nl})}} className="flex-1 p-2 border-2 rounded-xl" />
                                  <input type="time" value={sched.customTime} onChange={e=>{const nl=[...form.subjectList]; nl[sIdx].schedules[schIdx].customTime=e.target.value; setForm({...form, subjectList: nl})}} className="flex-1 p-2 border-2 rounded-xl font-bold" />
                                </div>
                              )}
                              {sub.schedules.length > 1 && <button type="button" onClick={()=>{const nl=[...form.subjectList]; nl[sIdx].schedules.splice(schIdx,1); setForm({...form, subjectList: nl})}} className="text-red-500 font-bold">删除时间</button>}
                            </div>
                          ))}
                          <button type="button" onClick={()=>addSchedule(sIdx)} className="flex items-center gap-2 text-sky-700 font-bold p-2 hover:bg-sky-100 rounded-xl transition-colors"><Icons.Plus /> 增加上课时间段</button>
                        </div>
                      </div>
                    ))}
                    <button type="button" onClick={addSubject} className="w-full p-6 border-4 border-dashed border-sky-300 rounded-3xl text-2xl font-bold text-sky-800 hover:bg-sky-50 flex items-center justify-center gap-2 transition-all"><Icons.Plus /> 增加一个新科目</button>
                  </div>

                  <div className="flex gap-4">
                    <button type="submit" className="flex-1 bg-blue-600 text-white p-6 rounded-3xl text-3xl font-black shadow-xl hover:scale-105 active:scale-95 transition-all">保存全部设置</button>
                    {editId && <button type="button" onClick={()=>{setEditId(null); setForm({teacherId:'',childId:'',feeAmount:'',feeType:'monthly',subjectList:[{name:'',schedules:[{id:Math.random(),type:'fixed',dayOfWeek:'1',time:'14:00',customDate:'',customTime:'14:00'}]}]})}} className="p-6 bg-gray-300 rounded-3xl text-xl font-bold">取消</button>}
                  </div>
                </form>
              </div>

              <div className="content-card">
                <h2 className="text-2xl font-bold mb-4 text-gray-500 uppercase tracking-widest">📋 当前配置总览</h2>
                {teachers.map(teach => {
                  const items = tuitions.filter(t => t.teacherId === teach.id);
                  if(!items.length) return null;
                  return (
                    <div key={teach.id} className="mb-6 border-2 border-gray-100 rounded-3xl p-4">
                      <h3 className="font-black text-xl text-blue-900 bg-blue-50 p-3 rounded-2xl mb-4">👨‍🏫 {teach.name}</h3>
                      <div className="space-y-4">
                        {items.map(t => {
                          const child = childrenList.find(c => c.id === t.childId);
                          return (
                            <div key={t.id} className="p-4 bg-gray-50 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border border-white shadow-sm">
                              <div>
                                <div className="text-2xl font-bold" style={{color:child?.color}}>{child?.name}</div>
                                <div className="text-gray-500 font-bold mb-2">收费: RM {t.feeAmount} ({t.feeType==='monthly'?'每月':'配套'})</div>
                                <div className="flex flex-wrap gap-2">
                                  {t.subjectList?.map((s,i) => (
                                    <div key={i} className="bg-white border-2 border-sky-200 px-3 py-2 rounded-xl">
                                      <span className="font-black text-sky-800">● {s.name}</span>
                                      <div className="text-[10px] text-gray-400">{s.schedules?.length} 个上课点</div>
                                    </div>
                                  ))}
                                </div>
                              </div>
                              <div className="flex gap-2 w-full md:w-auto">
                                <button onClick={()=>{setForm(t); setEditId(t.id); window.scrollTo(0,0)}} className="flex-1 bg-blue-100 text-blue-700 px-6 py-3 rounded-xl font-bold">修改</button>
                                <button onClick={async ()=>{if(confirm("确定彻底删除？")) await db.collection('tuitions').doc(t.id).delete()}} className="flex-1 bg-red-100 text-red-600 px-6 py-3 rounded-xl font-bold">删除</button>
                              </div>
                            </div>
                          )
                        })}
                      </div>
                    </div>
                  )
                })}
              </div>
            </div>
          );
        }

        function ChildrenManager({ childrenList }) {
          const [form, setForm] = useState({ name: '', type: 'own', color: '#3B82F6' });
          const [editId, setEditId] = useState(null);
          const colors = ['#EF4444', '#F97316', '#F59E0B', '#10B981', '#3B82F6', '#8B5CF6', '#EC4899'];
          const handleSubmit = async (e) => {
            e.preventDefault(); if (editId) await db.collection('children').doc(editId).update(form); else await db.collection('children').add(form);
            setForm({ name: '', type: 'own', color: '#3B82F6' }); setEditId(null);
          };
          return (
            <div className="space-y-6">
              <div className="content-card">
                <h2 className="text-2xl font-bold mb-4">{editId ? '修改孩子' : '添加孩子'}</h2>
                <form onSubmit={handleSubmit} className="space-y-4">
                  <input required value={form.name} onChange={e=>setForm({...form, name:e.target.value})} placeholder="孩子名字" className="w-full p-4 border-2 rounded-2xl text-xl" />
                  <div className="flex gap-2 flex-wrap">{colors.map(c => <div key={c} onClick={()=>setForm({...form,color:c})} className={`w-12 h-12 rounded-full border-4 cursor-pointer ${form.color===c?'border-black scale-110':'border-transparent'}`} style={{backgroundColor:c}}></div>)}</div>
                  <button type="submit" className="w-full bg-blue-600 text-white p-4 rounded-2xl text-xl font-bold">保存</button>
                </form>
              </div>
              <div className="grid grid-cols-2 gap-4">
                {childrenList.map(c => (
                  <div key={c.id} className="p-4 rounded-3xl text-white font-bold text-xl flex justify-between items-center shadow-lg" style={{backgroundColor:c.color}}>
                    {c.name}
                    <div className="flex gap-2">
                      <button onClick={()=> {setForm(c); setEditId(c.id);}} className="bg-white/20 p-2 rounded-lg"><Icons.Edit/></button>
                      <button onClick={async()=> {if(confirm("确定？")) await db.collection('children').doc(c.id).delete();}} className="bg-red-500/50 p-2 rounded-lg"><Icons.Trash/></button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
