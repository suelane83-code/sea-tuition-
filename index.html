<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海底补习记(完全修复版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Firebase 配置 ---
        const firebaseConfig = {
          apiKey: "AIzaSyCtw29Kz1An1PjIpI1lFCPUCjOsGGZTaAA",
          authDomain: "seatuition-2.firebaseapp.com",
          projectId: "seatuition-2",
          storageBucket: "seatuition-2.firebasestorage.app",
          messagingSenderId: "1081496173041",
          appId: "1:1081496173041:web:7cfe63d1eec0f77290ec50",
          measurementId: "G-FM41SK8LXH"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- Utility: 压缩图片 ---
        const compressImage = (file) => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
              const img = new Image(); img.src = event.target.result;
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500; let width = img.width; let height = img.height;
                if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.6)); 
              };
            };
          });
        };

        const Icons = {
          Home: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
          Calendar: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
          Users: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>,
          Book: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>,
          Check: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
          CreditCard: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>,
          Download: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
          Edit: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 Z"/></svg>,
          Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        };

        function App() {
          const [ready, setReady] = useState(false);
          const [activeTab, setActiveTab] = useState('dashboard');
          const [currentDate] = useState(new Date());
          const currentMonthStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;

          const [childrenList, setChildren] = useState([]);
          const [teachers, setTeachers] = useState([]);
          const [tuitions, setTuitions] = useState([]);
          const [bills, setBills] = useState([]);
          const [attendance, setAttendance] = useState([]);

          useEffect(() => {
            auth.signInAnonymously();
            const unsubAuth = auth.onAuthStateChanged(user => { if(user) setReady(true); });
            return () => unsubAuth();
          }, []);

          useEffect(() => {
            if (!ready) return;
            const unsubs = [
              db.collection('children').onSnapshot(snap => setChildren(snap.docs.map(d => ({id: d.id, ...d.data()})))),
              db.collection('teachers').onSnapshot(snap => setTeachers(snap.docs.map(d => ({id: d.id, ...d.data()})))),
              db.collection('tuitions').onSnapshot(snap => setTuitions(snap.docs.map(d => ({id: d.id, ...d.data()})))),
              db.collection('bills').onSnapshot(snap => setBills(snap.docs.map(d => ({id: d.id, ...d.data()})))),
              db.collection('attendance').onSnapshot(snap => setAttendance(snap.docs.map(d => ({id: d.id, ...d.data()})))),
            ];
            return () => unsubs.forEach(fn => fn());
          }, [ready]);

          // 自动生成账单
          useEffect(() => {
            if (!ready || tuitions.length === 0) return;
            tuitions.forEach(t => {
              const billExists = bills.some(b => b.tuitionId === t.id && b.month === currentMonthStr);
              if (!billExists) {
                db.collection('bills').add({
                  tuitionId: t.id, teacherId: t.teacherId, childId: t.childId,
                  month: currentMonthStr, amount: t.feeAmount, status: 'unpaid', createdAt: Date.now()
                });
              }
            });
          }, [ready, tuitions, currentMonthStr, bills]);

          const exportToExcel = () => {
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(childrenList), "孩子名单");
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(teachers), "老师资料");
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(bills), "付款记录");
            const flatAtt = attendance.map(a => ({ 月份: a.month, 科目: a.subName, 详细记录: JSON.stringify(a.dateRecords) }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(flatAtt), "打卡记录");
            XLSX.writeFile(wb, `海底补习全数据_${currentMonthStr}.xlsx`);
          };

          if (!ready) return <div className="text-2xl text-center p-10 font-bold text-white mt-20">🌊 修复数据连接中...</div>;

          const tabs = [
            { id: 'dashboard', label: '首页统计', icon: <Icons.Home /> },
            { id: 'calendar', label: '补习日历', icon: <Icons.Calendar /> },
            { id: 'attendance', label: '打卡记事', icon: <Icons.Check /> },
            { id: 'payments', label: '付款管理', icon: <Icons.CreditCard /> },
            { id: 'tuitions', label: '科目设置', icon: <Icons.Book /> },
            { id: 'children', label: '孩子管理', icon: <Icons.Users /> },
          ];

          return (
            <div className="min-h-screen pb-20 bg-sky-400">
              <style>{`body { font-family: 'Segoe UI', sans-serif; } .content-card { background: rgba(255, 255, 255, 0.96); border-radius: 24px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); } .tab-active { background: #2563eb; color: white; transform: translateY(-3px); shadow: 0 4px 10px rgba(0,0,0,0.2); }`}</style>
              <div className="bg-white/90 sticky top-0 z-50 px-2 py-3 flex overflow-x-auto gap-2 shadow-md no-scrollbar">
                {tabs.map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-shrink-0 flex items-center gap-2 px-6 py-3 rounded-2xl font-bold text-lg transition-all ${activeTab === tab.id ? 'tab-active' : 'bg-sky-50 text-sky-800'}`}>
                    {tab.icon} {tab.label}
                  </button>
                ))}
              </div>
              <div className="max-w-4xl mx-auto p-4 mt-2">
                {activeTab === 'dashboard' && <Dashboard childrenList={childrenList} tuitions={tuitions} bills={bills} teachers={teachers} currentMonthStr={currentMonthStr} exportFn={exportToExcel} />}
                {activeTab === 'calendar' && <CalendarView childrenList={childrenList} tuitions={tuitions} />}
                {activeTab === 'attendance' && <AttendanceManager childrenList={childrenList} tuitions={tuitions} attendance={attendance} currentMonthStr={currentMonthStr} />}
                {activeTab === 'payments' && <PaymentManager childrenList={childrenList} tuitions={tuitions} teachers={teachers} bills={bills} currentMonthStr={currentMonthStr} />}
                {activeTab === 'tuitions' && <TuitionManager childrenList={childrenList} teachers={teachers} tuitions={tuitions} />}
                {activeTab === 'children' && <ChildrenManager childrenList={childrenList} />}
              </div>
            </div>
          );
        }

        // --- DASHBOARD (修复费用统计与提醒) ---
        function Dashboard({ childrenList, tuitions, bills, teachers, currentMonthStr, exportFn }) {
          const today = new Date();
          const todayIso = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
          
          // 统计费用
          const currentMonthBills = bills.filter(b => b.month === currentMonthStr);
          const unpaidBills = currentMonthBills.filter(b => b.status === 'unpaid');
          let ownExp = 0; let nephExp = 0;
          currentMonthBills.forEach(b => {
             const c = childrenList.find(x => x.id === b.childId);
             if(c) { if(c.type === 'own') ownExp += parseFloat(b.amount||0); else nephExp += parseFloat(b.amount||0); }
          });

          // 今日课表
          const todays = [];
          tuitions.forEach(t => {
            const list = t.subjectList || [{ name: t.subjects, schedules: [{type:t.scheduleType, dayOfWeek:t.dayOfWeek, time:t.time, customDate:t.customDate, customTime:t.customTime}] }];
            list.forEach(sub => {
              sub.schedules?.forEach(s => {
                if ((s.type === 'fixed' && parseInt(s.dayOfWeek) === today.getDay()) || (s.type === 'custom' && s.customDate === todayIso)) {
                  todays.push({ childId: t.childId, subName: sub.name, time: s.type === 'fixed' ? s.time : s.customTime });
                }
              });
            });
          });

          return (
            <div className="space-y-6">
              {/* 付款提醒 */}
              {unpaidBills.length > 0 && today.getDate() >= 5 && (
                <div className="bg-red-500 text-white p-6 rounded-3xl shadow-xl animate-pulse">
                   <h2 className="text-2xl font-black">⚠️ 记得付补习费！</h2>
                   <p className="text-lg">本月还有 {unpaidBills.length} 笔费用未处理。</p>
                </div>
              )}

              {/* 今日课表 */}
              <div className="bg-yellow-100 border-l-8 border-yellow-500 p-6 rounded-3xl shadow">
                <h2 className="text-2xl font-black text-yellow-900 mb-4">🐚 今日提醒</h2>
                {todays.length > 0 ? todays.map((it, i) => (
                  <div key={i} className="bg-white/80 p-3 rounded-xl mb-2 flex justify-between">
                    <span className="font-bold">{childrenList.find(c=>c.id===it.childId)?.name}：{it.subName}</span>
                    <span className="text-blue-600 font-black">⏰ {it.time}</span>
                  </div>
                )) : <p className="text-gray-500">今天没有补习。</p>}
              </div>

              {/* 费用统计卡片 (找回来了!) */}
              <div className="content-card">
                <h2 className="text-2xl font-black text-blue-900 mb-6">📊 本月费用分析 ({currentMonthStr})</h2>
                <div className="grid grid-cols-2 gap-4 mb-6">
                  <div className="bg-blue-50 p-6 rounded-3xl border-2 border-blue-100">
                    <div className="text-blue-600 font-bold">👦👧 儿子女儿</div>
                    <div className="text-3xl font-black text-blue-800">RM {ownExp.toFixed(2)}</div>
                  </div>
                  <div className="bg-purple-50 p-6 rounded-3xl border-2 border-purple-100">
                    <div className="text-purple-600 font-bold">🧑‍🤝‍🧑 侄子侄女</div>
                    <div className="text-3xl font-black text-purple-800">RM {nephExp.toFixed(2)}</div>
                  </div>
                </div>
                <div className="text-center p-4 bg-gray-100 rounded-2xl text-xl font-black">总支出：RM {(ownExp+nephExp).toFixed(2)}</div>
              </div>

              {/* 导出按钮 */}
              <button onClick={exportFn} className="w-full p-6 bg-green-600 text-white rounded-3xl font-black text-xl flex items-center justify-center gap-3 shadow-lg active:scale-95">
                <Icons.Download /> 导出全系统数据到 Excel
              </button>
            </div>
          );
        }

        // --- ATTENDANCE (修复日期显示) ---
        function AttendanceManager({ childrenList, tuitions, attendance, currentMonthStr }) {
          const getDatesForSub = (sub) => {
            const [y, m] = currentMonthStr.split('-').map(Number);
            const daysInMonth = new Date(y, m, 0).getDate();
            const dates = [];
            sub.schedules?.forEach(s => {
              if (s.type === 'fixed') {
                for (let d = 1; d <= daysInMonth; d++) {
                  const dobj = new Date(y, m - 1, d);
                  if (dobj.getDay() === parseInt(s.dayOfWeek)) dates.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
                }
              } else if (s.type === 'custom' && s.customDate.startsWith(currentMonthStr)) dates.push(s.customDate);
            });
            return [...new Set(dates)].sort();
          };

          const handleMark = async (tId, subName, dStr, cur) => {
            let next = cur === 'attended' ? 'missed' : cur === 'missed' ? null : 'attended';
            let reason = next === 'missed' ? (prompt("缺席原因：") || "未注明") : "";
            const key = `${tId}_${subName}`;
            const rec = attendance.find(a => a.attendanceKey === key && a.month === currentMonthStr);
            const dr = rec ? { ...rec.dateRecords } : {};
            if (next) dr[dStr] = { status: next, reason }; else delete dr[dStr];
            if (rec) await db.collection('attendance').doc(rec.id).update({ dateRecords: dr });
            else await db.collection('attendance').add({ attendanceKey: key, tuitionId: tId, subName, month: currentMonthStr, dateRecords: dr });
          };

          return (
            <div className="content-card">
              <h2 className="text-2xl font-black mb-6 text-blue-900 border-b-2 pb-2">📅 补习打卡记事本</h2>
              {childrenList.map(child => {
                const childT = tuitions.filter(t => t.childId === child.id);
                if (!childT.length) return null;
                return (
                  <div key={child.id} className="mb-8 border-4 rounded-[32px] overflow-hidden bg-white shadow-lg" style={{borderColor: child.color}}>
                    <div className="p-4 text-2xl font-black text-white" style={{backgroundColor: child.color}}>{child.name}</div>
                    <div className="p-4">
                      {childT.map(t => {
                         const list = t.subjectList || [{ name: t.subjects, schedules: [{type:t.scheduleType, dayOfWeek:t.dayOfWeek, time:t.time, customDate:t.customDate, customTime:t.customTime}] }];
                         return list.map(sub => {
                           const dates = getDatesForSub(sub);
                           const rec = attendance.find(a => a.attendanceKey === `${t.id}_${sub.name}` && a.month === currentMonthStr);
                           return (
                             <div key={sub.name} className="mb-4 border-b pb-4 last:border-0">
                               <div className="font-bold text-lg mb-2 text-gray-700">📚 {sub.name}</div>
                               <div className="flex flex-wrap gap-2">
                                 {dates.map(d => {
                                   const st = rec?.dateRecords?.[d] || { status: null };
                                   const bg = st.status === 'attended' ? 'bg-green-500 text-white' : st.status === 'missed' ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-400';
                                   return (
                                     <button key={d} onClick={() => handleMark(t.id, sub.name, d, st.status)} className={`p-2 rounded-xl text-center min-w-[70px] border ${bg}`}>
                                       <div className="text-[10px]">{d.split('-')[2]}日</div>
                                       <div className="font-black">{st.status==='attended'?'已补':st.status==='missed'?'缺席':'待补'}</div>
                                     </button>
                                   );
                                 })}
                               </div>
                             </div>
                           )
                         })
                      })}
                    </div>
                  </div>
                )
              })}
            </div>
          );
        }

        function TuitionManager({ childrenList, teachers, tuitions }) {
          const [teacherName, setTeacherName] = useState('');
          const [form, setForm] = useState({
            teacherId: '', childId: '', feeAmount: '', feeType: 'monthly',
            subjectList: [{ name: '', schedules: [{ id: Math.random(), type: 'fixed', dayOfWeek: '1', time: '14:00', customDate: '', customTime: '14:00' }] }]
          });
          const [editId, setEditId] = useState(null);

          const handleSave = async (e) => {
            e.preventDefault();
            if (editId) await db.collection('tuitions').doc(editId).update(form);
            else await db.collection('tuitions').add(form);
            setForm({ teacherId:'', childId:'', feeAmount:'', feeType:'monthly', subjectList:[{ name:'', schedules:[{ id:Math.random(), type:'fixed', dayOfWeek:'1', time:'14:00', customDate:'', customTime:'14:00' }] }] });
            setEditId(null);
          };

          const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

          return (
            <div className="space-y-8">
              <div className="content-card">
                <h2 className="text-xl font-black mb-4">1. 添加老师</h2>
                <div className="flex gap-4">
                  <input value={teacherName} onChange={e=>setTeacherName(e.target.value)} placeholder="老师名字" className="flex-1 p-3 border-2 rounded-xl text-xl" />
                  <button onClick={async ()=>{if(teacherName) await db.collection('teachers').add({name: teacherName}); setTeacherName('')}} className="bg-blue-600 text-white px-8 rounded-xl font-bold">添加</button>
                </div>
              </div>
              <div className="content-card border-4 border-blue-500">
                <h2 className="text-2xl font-black text-blue-900 mb-6">2. 设定科目与时间</h2>
                <form onSubmit={handleSave} className="space-y-6">
                  <div className="grid grid-cols-2 gap-4">
                    <select required value={form.teacherId} onChange={e=>setForm({...form, teacherId:e.target.value})} className="p-3 border-2 rounded-xl font-bold"><option value="">- 老师 -</option>{teachers.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select>
                    <select required value={form.childId} onChange={e=>setForm({...form, childId:e.target.value})} className="p-3 border-2 rounded-xl font-bold"><option value="">- 孩子 -</option>{childrenList.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
                  </div>
                  <div className="p-4 bg-yellow-50 rounded-2xl flex gap-4">
                    <select value={form.feeType} onChange={e=>setForm({...form, feeType:e.target.value})} className="p-2 border-2 rounded-xl font-bold"><option value="monthly">每月</option><option value="package">配套</option></select>
                    <input placeholder="RM 总费用" type="number" step="0.01" value={form.feeAmount} onChange={e=>setForm({...form, feeAmount:e.target.value})} className="flex-1 p-2 border-2 rounded-xl font-black text-red-600 text-2xl" />
                  </div>
                  {form.subjectList.map((sub, sIdx) => (
                    <div key={sIdx} className
