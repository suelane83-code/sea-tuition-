<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 这个 meta 标签确保在手机上字体够大，且像App一样不能乱缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海底补习记</title>
    <!-- 引入 Tailwind CSS (用于样式) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React (用于逻辑) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel (用于编译代码) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Utility: 离线存储 Hook (LocalStorage) ---
        function useLocalStorage(key, initialValue) {
          const [storedValue, setStoredValue] = useState(() => {
            try {
              const item = window.localStorage.getItem(key);
              return item ? JSON.parse(item) : initialValue;
            } catch (error) {
              console.error(error);
              return initialValue;
            }
          });

          const setValue = (value) => {
            try {
              const valueToStore = value instanceof Function ? value(storedValue) : value;
              setStoredValue(valueToStore);
              window.localStorage.setItem(key, JSON.stringify(valueToStore));
            } catch (error) {
              console.error(error);
              if (error.name === 'QuotaExceededError' || error.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
                alert('⚠️ 设备的存储空间已满！可能是收据图片太多了，请删除一些旧记录的收据图片。');
              }
            }
          };
          return [storedValue, setValue];
        }

        // --- Utility: 生成唯一 ID ---
        const generateId = () => Math.random().toString(36).substring(2, 15) + Date.now().toString(36);

        // --- Utility: 图片极度压缩 (为了省本地空间) ---
        const compressImage = (file) => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
              const img = new Image();
              img.src = event.target.result;
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 400; // 离线版进一步压低分辨率以防挤爆存储
                let width = img.width;
                let height = img.height;
                if (width > MAX_WIDTH) {
                  height = Math.round((height * MAX_WIDTH) / width);
                  width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.5)); // 50% 画质
              };
            };
          });
        };

        // --- SVG Icons ---
        const Icons = {
          Home: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
          Calendar: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
          Users: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
          Book: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>,
          Check: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
          CreditCard: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>,
          Edit: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 Z"/></svg>,
          Trash: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        };

        // --- Main App Component ---
        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [currentDate] = useState(new Date());
          const currentMonthStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;

          // Local Data States
          const [children, setChildren] = useLocalStorage('sea_children', []);
          const [teachers, setTeachers] = useLocalStorage('sea_teachers', []);
          const [tuitions, setTuitions] = useLocalStorage('sea_tuitions', []);
          const [bills, setBills] = useLocalStorage('sea_bills', []);
          const [attendance, setAttendance] = useLocalStorage('sea_attendance', []);

          // Global Styles for Theme
          useEffect(() => {
            const style = document.createElement('style');
            style.innerHTML = `
              body {
                background: linear-gradient(180deg, #87CEEB 0%, #1E90FF 100%);
                background-attachment: fixed;
                min-height: 100vh;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
              }
              .sea-creature {
                position: fixed;
                font-size: 3rem;
                z-index: -1;
                opacity: 0.6;
                pointer-events: none;
              }
              @keyframes swimR { 0% { transform: translateX(-10vw) translateY(0); } 100% { transform: translateX(110vw) translateY(-20px); } }
              @keyframes swimL { 0% { transform: translateX(110vw) translateY(0) scaleX(-1); } 100% { transform: translateX(-10vw) translateY(20px) scaleX(-1); } }
              @keyframes floatUp { 0% { transform: translateY(110vh) translateX(0); } 100% { transform: translateY(-10vh) translateX(20px); } }
              .fish1 { animation: swimR 20s linear infinite; top: 15%; }
              .fish2 { animation: swimL 25s linear infinite; top: 40%; font-size: 4rem; }
              .crab { animation: swimR 30s linear infinite; bottom: 5%; font-size: 2.5rem; }
              .jelly { animation: floatUp 15s ease-in-out infinite alternate; left: 20%; font-size: 5rem; }
              .octopus { animation: floatUp 22s ease-in-out infinite alternate; right: 15%; font-size: 4rem; }
              
              .content-card {
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(10px);
                border-radius: 20px;
                box-shadow: 0 8px 32px rgba(0,0,0,0.1);
                z-index: 10;
                position: relative;
              }
              .no-scrollbar::-webkit-scrollbar { display: none; }
              .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            `;
            document.head.appendChild(style);
            return () => document.head.removeChild(style);
          }, []);

          // --- Auto Generate Bills Logic (Offline Adaptation) ---
          useEffect(() => {
            if (tuitions.length === 0) return;
            
            let newBillsAdded = false;
            let currentBills = [...bills];

            tuitions.forEach(tuition => {
              if (tuition.feeType === 'monthly') {
                const billExists = currentBills.some(b => b.tuitionId === tuition.id && b.month === currentMonthStr);
                if (!billExists) {
                  currentBills.push({
                    id: generateId(),
                    tuitionId: tuition.id,
                    teacherId: tuition.teacherId,
                    childId: tuition.childId,
                    month: currentMonthStr,
                    amount: tuition.feeAmount,
                    status: 'unpaid',
                    createdAt: Date.now()
                  });
                  newBillsAdded = true;
                }
              } else if (tuition.feeType === 'package') {
                 const tuitionBills = currentBills.filter(b => b.tuitionId === tuition.id).sort((a,b) => b.month.localeCompare(a.month));
                 const latestBill = tuitionBills[0];
                 
                 if (!latestBill) {
                   currentBills.push({
                     id: generateId(), tuitionId: tuition.id, teacherId: tuition.teacherId, childId: tuition.childId,
                     month: currentMonthStr, amount: tuition.feeAmount, status: 'unpaid', createdAt: Date.now()
                   });
                   newBillsAdded = true;
                 } else if (latestBill.status === 'paid') {
                   const lastPaidDate = new Date(latestBill.month + "-01");
                   const targetDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
                   const monthsDiff = (targetDate.getFullYear() - lastPaidDate.getFullYear()) * 12 + (targetDate.getMonth() - lastPaidDate.getMonth());
                   
                   if (monthsDiff >= parseInt(tuition.packageDuration) && !tuitionBills.some(b => b.month === currentMonthStr)) {
                      currentBills.push({
                        id: generateId(), tuitionId: tuition.id, teacherId: tuition.teacherId, childId: tuition.childId,
                        month: currentMonthStr, amount: tuition.feeAmount, status: 'unpaid', createdAt: Date.now()
                      });
                      newBillsAdded = true;
                   }
                 }
              }
            });

            if (newBillsAdded) {
              setBills(currentBills);
            }
          }, [tuitions, currentMonthStr]); // eslint-disable-line

          const tabs = [
            { id: 'dashboard', label: '首页统计', icon: <Icons.Home /> },
            { id: 'calendar', label: '补习日历', icon: <Icons.Calendar /> },
            { id: 'attendance', label: '打卡记录', icon: <Icons.Check /> },
            { id: 'payments', label: '付款管理', icon: <Icons.CreditCard /> },
            { id: 'children', label: '孩子管理', icon: <Icons.Users /> },
            { id: 'tuitions', label: '科目设置', icon: <Icons.Book /> },
          ];

          return (
            <div className="min-h-screen text-gray-800 pb-20">
              {/* Background Animations */}
              <div className="sea-creature fish1">🐠</div>
              <div className="sea-creature fish2">🐡</div>
              <div className="sea-creature crab">🦀</div>
              <div className="sea-creature jelly">🪼</div>
              <div className="sea-creature octopus">🐙</div>

              {/* Header Info */}
              <div className="bg-blue-900 text-white text-center py-1 text-sm opacity-80 shadow">
                已开启本地离线模式 (数据保存在此手机内)
              </div>

              {/* Top Navigation */}
              <div className="bg-white/90 backdrop-blur sticky top-0 z-50 shadow-md">
                <div className="max-w-4xl mx-auto flex overflow-x-auto p-2 no-scrollbar">
                  {tabs.map(tab => (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTab(tab.id)}
                      className={`flex-shrink-0 flex items-center px-4 py-3 mx-1 rounded-xl text-xl font-bold transition-colors ${
                        activeTab === tab.id ? 'bg-blue-500 text-white shadow-lg' : 'bg-blue-100 text-blue-800 hover:bg-blue-200'
                      }`}
                    >
                      <span className="mr-2">{tab.icon}</span>
                      {tab.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Main Content Area */}
              <div className="max-w-4xl mx-auto p-4 mt-4">
                {activeTab === 'dashboard' && <Dashboard childrenList={children} tuitions={tuitions} bills={bills} currentMonthStr={currentMonthStr} teachers={teachers} />}
                {activeTab === 'calendar' && <CalendarView childrenList={children} tuitions={tuitions} />}
                {activeTab === 'attendance' && <AttendanceManager childrenList={children} tuitions={tuitions} attendance={attendance} setAttendance={setAttendance} currentMonthStr={currentMonthStr} />}
                {activeTab === 'payments' && <PaymentManager childrenList={children} tuitions={tuitions} teachers={teachers} bills={bills} setBills={setBills} currentMonthStr={currentMonthStr} />}
                {activeTab === 'children' && <ChildrenManager childrenList={children} setChildren={setChildren} />}
                {activeTab === 'tuitions' && <TuitionManager childrenList={children} teachers={teachers} setTeachers={setTeachers} tuitions={tuitions} setTuitions={setTuitions} />}
              </div>
            </div>
          );
        }

        // ============================================================================
        // COMPONENTS
        // ============================================================================

        // --- 1. Dashboard ---
        function Dashboard({ childrenList, tuitions, bills, currentMonthStr, teachers }) {
          const today = new Date();
          const isPaymentUrgent = today.getDate() >= 5;
          const todayDayOfWeek = today.getDay();
          
          const handleDownloadApp = () => {
            try {
              const htmlCopy = document.documentElement.cloneNode(true);
              const rootDiv = htmlCopy.querySelector('#root');
              if(rootDiv) rootDiv.innerHTML = '';
              const htmlContent = "<!DOCTYPE html>\n" + htmlCopy.outerHTML;
              const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = '海底补习记.html';
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
              alert("✅ 下载指令已发出！\n\n【接下来请务必跟着做】：\n1. 退出现在的 WhatsApp 画面，回到手机桌面\n2. 去手机找黄色的「我的文件 / 文件管理 (Files)」APP\n3. 进「下载 (Downloads)」找到刚下载的【海底补习记.html】\n4. 点击它，选择用 Chrome 浏览器打开！");
            } catch (err) {
              alert("下载遇到问题。请点击右上角三个点，选择「在浏览器中打开」。");
            }
          };

          const todaysTuitions = tuitions
            .filter(t => t.scheduleType === 'fixed' && parseInt(t.dayOfWeek) === todayDayOfWeek)
            .sort((a, b) => a.time.localeCompare(b.time));

          const currentMonthBills = bills.filter(b => b.month === currentMonthStr);
          const unpaidBills = currentMonthBills.filter(b => b.status === 'unpaid');

          let ownExpenses = 0;
          let nephewExpenses = 0;

          currentMonthBills.forEach(bill => {
            const child = childrenList.find(c => c.id === bill.childId);
            if (child) {
              const amount = parseFloat(bill.amount) || 0;
              if (child.type === 'own') ownExpenses += amount;
              if (child.type === 'nephew') nephewExpenses += amount;
            }
          });

          return (
            <div className="space-y-6">
              {/* 1. 今日补习提醒 */}
              {todaysTuitions.length > 0 ? (
                <div className="bg-cyan-100 border-l-8 border-cyan-500 text-cyan-900 p-6 rounded-xl shadow">
                  <h2 className="text-3xl font-bold mb-3 flex items-center">
                    <span className="mr-2">🐠</span> 今日补习提醒
                  </h2>
                  <ul className="space-y-3 text-2xl">
                    {todaysTuitions.map(t => {
                      const child = childrenList.find(c => c.id === t.childId);
                      const teacher = teachers.find(teach => teach.id === t.teacherId);
                      return (
                        <li key={t.id} className="bg-white/60 p-4 rounded-lg flex flex-col md:flex-row md:items-center">
                          <span className="font-bold text-cyan-700 w-28">⏰ {t.time}</span>
                          <div className="mt-2 md:mt-0">
                            <span className="font-extrabold mx-2 text-3xl" style={{color: child?.color || '#000'}}>{child?.name}</span>
                            <span>- {t.subjects} <span className="text-xl text-gray-600">({teacher?.name} 老师)</span></span>
                          </div>
                        </li>
                      );
                    })}
                  </ul>
                </div>
              ) : (
                <div className="bg-green-100 border-l-8 border-green-500 text-green-900 p-5 rounded-xl shadow">
                  <h2 className="text-2xl font-bold flex items-center">
                    <span className="mr-2">🌿</span> 今日没有固定安排的补习，好好放松吧！
                  </h2>
                </div>
              )}

              {/* 2. 付款提醒 */}
              {isPaymentUrgent && unpaidBills.length > 0 && (
                <div className="bg-red-100 border-l-8 border-red-500 text-red-800 p-6 rounded-xl shadow animate-pulse">
                  <h2 className="text-3xl font-bold mb-2">⚠️ 提醒付款！</h2>
                  <p className="text-2xl">今天是 {today.getDate()} 号，您还有 {unpaidBills.length} 笔本月补习费未付款！</p>
                </div>
              )}

              <div className="content-card p-6">
                <h2 className="text-3xl font-bold mb-6 text-blue-900 border-b-2 pb-2">本月费用统计 ({currentMonthStr})</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="bg-blue-50 p-6 rounded-2xl border-2 border-blue-200">
                    <h3 className="text-2xl font-bold text-blue-800 mb-2">👦👧 儿子女儿</h3>
                    <p className="text-4xl font-extrabold text-blue-600">RM {ownExpenses.toFixed(2)}</p>
                  </div>
                  <div className="bg-purple-50 p-6 rounded-2xl border-2 border-purple-200">
                    <h3 className="text-2xl font-bold text-purple-800 mb-2">🧑‍🤝‍🧑 侄子侄女</h3>
                    <p className="text-4xl font-extrabold text-purple-600">RM {nephewExpenses.toFixed(2)}</p>
                  </div>
                </div>
                <div className="mt-6 bg-gray-50 p-4 rounded-xl text-2xl font-bold text-center">
                  总计：RM {(ownExpenses + nephewExpenses).toFixed(2)}
                </div>
              </div>

              <div className="content-card p-6">
                <h2 className="text-2xl font-bold mb-4">本月未付款明细</h2>
                {unpaidBills.length === 0 ? (
                  <p className="text-xl text-green-600 font-bold">🎉 太棒了！本月所有费用已付清。</p>
                ) : (
                  <ul className="space-y-3 text-xl">
                    {unpaidBills.map(bill => {
                      const child = childrenList.find(c => c.id === bill.childId);
                      const teacher = teachers.find(t => t.id === bill.teacherId);
                      return (
                        <li key={bill.id} className="flex justify-between items-center bg-red-50 p-3 rounded-lg border border-red-200">
                          <span>
                            <span className="font-bold mr-2">{child?.name}</span>
                            <span>的 {teacher?.name} 老师</span>
                          </span>
                          <span className="font-bold text-red-600">RM {bill.amount}</span>
                        </li>
                      );
                    })}
                  </ul>
                )}
              </div>

              {/* 下载到手机按钮 (缩小并移至最下方) */}
              <div className="flex justify-center pt-2 pb-4">
                <button
                  onClick={handleDownloadApp}
                  className="bg-yellow-100 border-2 border-yellow-400 text-yellow-800 px-6 py-2 rounded-full font-bold shadow-sm hover:bg-yellow-200 transition flex items-center text-sm md:text-base"
                >
                  <span className="mr-2 text-lg">📥</span> 下载此系统到手机 (解决 WhatsApp 无法加桌面的问题)
                </button>
              </div>

            </div>
          );
        }

        // --- 2. Calendar View ---
        function CalendarView({ childrenList, tuitions }) {
          const [date, setDate] = useState(new Date());
          
          const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
          const firstDayOfMonth = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
          const daysInMonth = getDaysInMonth(date.getFullYear(), date.getMonth());
          
          const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];

          const days = [];
          for (let i = 0; i < firstDayOfMonth; i++) days.push(null);
          for (let i = 1; i <= daysInMonth; i++) days.push(i);

          const getEventsForDay = (day) => {
            if (!day) return [];
            const currentDayOfWeek = new Date(date.getFullYear(), date.getMonth(), day).getDay();
            
            return tuitions.filter(t => {
              if (t.scheduleType === 'fixed') {
                return parseInt(t.dayOfWeek) === currentDayOfWeek;
              }
              return false; 
            }).map(t => {
              const child = childrenList.find(c => c.id === t.childId);
              return { ...t, child };
            }).filter(t => t.child);
          };

          const prevMonth = () => setDate(new Date(date.getFullYear(), date.getMonth() - 1, 1));
          const nextMonth = () => setDate(new Date(date.getFullYear(), date.getMonth() + 1, 1));

          return (
            <div className="content-card p-4 md:p-6">
              <div className="flex justify-between items-center mb-6">
                <button onClick={prevMonth} className="p-3 bg-blue-100 rounded-xl text-xl font-bold hover:bg-blue-200">◀ 上个月</button>
                <h2 className="text-3xl font-bold">{date.getFullYear()}年 {monthNames[date.getMonth()]}</h2>
                <button onClick={nextMonth} className="p-3 bg-blue-100 rounded-xl text-xl font-bold hover:bg-blue-200">下个月 ▶</button>
              </div>

              <div className="grid grid-cols-7 gap-1 md:gap-2 text-center text-lg md:text-xl font-bold mb-2">
                {['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d} className="text-blue-800">{d}</div>)}
              </div>

              <div className="grid grid-cols-7 gap-1 md:gap-2">
                {days.map((day, index) => {
                  const events = getEventsForDay(day);
                  return (
                    <div key={index} className={`min-h-[100px] border-2 rounded-xl p-1 ${day ? 'bg-white' : 'bg-transparent border-transparent'} ${day === new Date().getDate() && date.getMonth() === new Date().getMonth() ? 'border-blue-500 bg-blue-50' : 'border-gray-200'}`}>
                      {day && <div className="font-bold text-gray-500 mb-1">{day}</div>}
                      <div className="space-y-1">
                        {events.map((ev, i) => (
                          <div key={i} className="text-sm md:text-base p-1 rounded font-bold truncate text-white" style={{ backgroundColor: ev.child.color || '#3B82F6' }}>
                            {ev.time} {ev.child.name}<br className="hidden md:block"/>({ev.subjects})
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        }

        // --- 3. Attendance Manager ---
        function AttendanceManager({ childrenList, tuitions, attendance, setAttendance, currentMonthStr }) {
          
          const handleSlotClick = (tuitionId, childId, slotIndex, currentStatus) => {
            let newStatus = 'attended';
            let note = '';
            
            if (currentStatus === 'attended') {
              newStatus = 'missed';
              note = prompt("没补习？请注明原因及补回时间：", "") || "无原因";
            } else if (currentStatus === 'missed') {
              newStatus = null;
            }

            setAttendance(prev => {
              const existingIdx = prev.findIndex(a => a.tuitionId === tuitionId && a.month === currentMonthStr);
              if (existingIdx >= 0) {
                const updated = [...prev];
                const newSlots = [...(updated[existingIdx].slots || Array(7).fill({ status: null, note: '' }))];
                newSlots[slotIndex] = { status: newStatus, note };
                updated[existingIdx] = { ...updated[existingIdx], slots: newSlots };
                return updated;
              } else {
                const newSlots = Array(7).fill({ status: null, note: '' });
                newSlots[slotIndex] = { status: newStatus, note };
                return [...prev, { id: generateId(), tuitionId, childId, month: currentMonthStr, slots: newSlots }];
              }
            });
          };

          return (
            <div className="content-card p-6">
              <h2 className="text-3xl font-bold mb-6 text-blue-900 border-b-2 pb-2">本月打卡记录 ({currentMonthStr})</h2>
              <p className="text-xl mb-4 text-gray-600">点击格子标记：<span className="text-green-600 font-bold">绿色=已补</span>，<span className="text-red-600 font-bold">红色=没补</span></p>

              {childrenList.map(child => {
                const childTuitions = tuitions.filter(t => t.childId === child.id);
                if (childTuitions.length === 0) return null;

                return (
                  <div key={child.id} className="mb-8 border-4 rounded-2xl overflow-hidden" style={{ borderColor: child.color || '#ccc' }}>
                    <div className="p-4 text-2xl font-bold text-white" style={{ backgroundColor: child.color || '#ccc' }}>
                      {child.name}
                    </div>
                    <div className="p-4 bg-white overflow-x-auto">
                      <table className="w-full text-xl text-center">
                        <thead>
                          <tr className="border-b-2">
                            <th className="py-2 text-left w-1/3">补习科目</th>
                            <th colSpan="7" className="py-2">打卡天数 (最多7天)</th>
                          </tr>
                        </thead>
                        <tbody>
                          {childTuitions.map(tuition => {
                            const att = attendance.find(a => a.tuitionId === tuition.id && a.month === currentMonthStr) || { slots: Array(7).fill({ status: null }) };
                            
                            return (
                              <tr key={tuition.id} className="border-b border-gray-100">
                                <td className="py-4 text-left font-bold">{tuition.subjects}</td>
                                {Array.from({ length: 7 }).map((_, idx) => {
                                  const slot = att.slots[idx] || { status: null };
                                  let bg = 'bg-gray-100 hover:bg-gray-200';
                                  let text = '➕';
                                  if (slot.status === 'attended') { bg = 'bg-green-500 text-white'; text = '已补'; }
                                  if (slot.status === 'missed') { bg = 'bg-red-500 text-white'; text = '没补'; }

                                  return (
                                    <td key={idx} className="p-1 w-12">
                                      <button
                                        onClick={() => handleSlotClick(tuition.id, child.id, idx, slot.status)}
                                        className={`w-14 h-14 md:w-16 md:h-16 rounded-xl font-bold shadow transition-all ${bg}`}
                                        title={slot.note}
                                      >
                                        {text}
                                      </button>
                                      {slot.note && <div className="text-xs text-red-600 mt-1 truncate w-14 md:w-16 mx-auto" title={slot.note}>{slot.note}</div>}
                                    </td>
                                  );
                                })}
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        }

        // --- 4. Payment Manager ---
        function PaymentManager({ childrenList, tuitions, teachers, bills, setBills, currentMonthStr }) {
          const [showHistory, setShowHistory] = useState(false);

          const handlePay = (billId) => {
            setBills(bills.map(b => b.id === billId ? { ...b, status: 'paid', paidAt: Date.now() } : b));
          };

          const handleUnpay = (billId) => {
            setBills(bills.map(b => b.id === billId ? { ...b, status: 'unpaid', paidAt: null, receiptData: null } : b));
          };

          const handleUploadReceipt = async (e, billId) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
              const base64 = await compressImage(file);
              setBills(bills.map(b => b.id === billId ? { ...b, receiptData: base64 } : b));
              alert("收据上传成功！");
            } catch (err) {
              console.error(err);
              alert("上传失败，图片可能太大。");
            }
          };

          const handleDeleteReceipt = (billId) => {
            if(confirm("确定要删除这张收据吗？(这可以释放设备的存储空间)")) {
              setBills(bills.map(b => b.id === billId ? { ...b, receiptData: null } : b));
            }
          }

          const currentMonthBills = bills.filter(b => b.month === currentMonthStr);
          const pastBills = bills.filter(b => b.month !== currentMonthStr).sort((a,b) => b.month.localeCompare(a.month));

          return (
            <div className="content-card p-6">
              <div className="flex justify-between items-center mb-6 border-b-2 pb-2">
                <h2 className="text-3xl font-bold text-blue-900">付款管理 ({currentMonthStr})</h2>
                <button onClick={() => setShowHistory(!showHistory)} className="bg-purple-500 text-white px-4 py-2 rounded-xl text-xl font-bold shadow-lg">
                  {showHistory ? '返回本月' : '查看历史记录'}
                </button>
              </div>

              {!showHistory ? (
                <div className="space-y-6">
                  {teachers.map(teacher => {
                    const teacherBills = currentMonthBills.filter(b => b.teacherId === teacher.id);
                    if (teacherBills.length === 0) return null;

                    return (
                      <div key={teacher.id} className="border-4 border-blue-200 rounded-2xl p-4 bg-white shadow-sm">
                        <h3 className="text-2xl font-bold mb-4 bg-blue-100 p-2 rounded-xl">👨‍🏫 {teacher.name} 老师</h3>
                        <div className="space-y-4">
                          {teacherBills.map(bill => {
                            const child = childrenList.find(c => c.id === bill.childId);
                            const tuition = tuitions.find(t => t.id === bill.tuitionId);
                            const isPaid = bill.status === 'paid';

                            return (
                              <div key={bill.id} className={`p-4 rounded-xl border-2 flex flex-col md:flex-row justify-between items-center gap-4 ${isPaid ? 'border-green-400 bg-green-50' : 'border-red-400 bg-red-50'}`}>
                                <div className="text-xl">
                                  <span className="font-bold text-2xl" style={{color: child?.color}}>{child?.name}</span>
                                  <span className="mx-2">-</span>
                                  <span>{tuition?.subjects}</span>
                                  <div className="text-gray-600 mt-1">
                                    费用: <span className="font-bold text-black">RM {bill.amount}</span> 
                                    ({tuition?.feeType === 'monthly' ? '每月' : `${tuition?.packageDuration}个月配套`})
                                  </div>
                                </div>

                                <div className="flex flex-wrap items-center gap-4 justify-center md:justify-end">
                                  {isPaid ? (
                                    <>
                                      <span className="text-2xl font-bold text-green-600">✅ 已付</span>
                                      {bill.receiptData ? (
                                        <div className="relative group">
                                          <img src={bill.receiptData} alt="收据" className="w-16 h-16 object-cover rounded border cursor-pointer" onClick={() => window.open(bill.receiptData)} />
                                          <button onClick={() => handleDeleteReceipt(bill.id)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 text-xs shadow-lg">X</button>
                                        </div>
                                      ) : (
                                        <label className="bg-gray-200 p-2 rounded-xl cursor-pointer text-lg font-bold hover:bg-gray-300">
                                          上传收据
                                          <input type="file" className="hidden" accept="image/*" onChange={(e) => handleUploadReceipt(e, bill.id)} />
                                        </label>
                                      )}
                                      <button onClick={() => handleUnpay(bill.id)} className="text-gray-500 underline text-lg p-2">撤销</button>
                                    </>
                                  ) : (
                                    <button onClick={() => handlePay(bill.id)} className="bg-red-500 text-white px-6 py-3 rounded-xl text-2xl font-bold shadow-lg hover:bg-red-600 transition">
                                      确认付款
                                    </button>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                  {currentMonthBills.length === 0 && <p className="text-2xl text-center p-10">本月暂无账单数据。</p>}
                </div>
              ) : (
                <div className="space-y-4">
                  <h3 className="text-2xl font-bold mb-4">过去付款记录</h3>
                  {pastBills.length === 0 && <p className="text-xl">还没有历史记录。</p>}
                  {pastBills.map(bill => {
                     const child = childrenList.find(c => c.id === bill.childId);
                     const teacher = teachers.find(t => t.id === bill.teacherId);
                     return (
                       <div key={bill.id} className="p-4 bg-gray-50 border-2 rounded-xl flex justify-between items-center">
                         <div>
                           <div className="font-bold text-xl">{bill.month} - <span style={{color: child?.color}}>{child?.name}</span> ({teacher?.name})</div>
                           <div className="text-lg mt-1">RM {bill.amount} - {bill.status === 'paid' ? <span className="text-green-600 font-bold">✅ 已付</span> : <span className="text-red-600 font-bold">❌ 未付</span>}</div>
                         </div>
                         {bill.receiptData && (
                           <div className="relative">
                             <img src={bill.receiptData} className="w-16 h-16 rounded border" alt="receipt"/>
                             <button onClick={() => handleDeleteReceipt(bill.id)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 text-xs shadow-lg">X</button>
                           </div>
                         )}
                       </div>
                     )
                  })}
                </div>
              )}
            </div>
          );
        }

        // --- 5. Children Manager ---
        function ChildrenManager({ childrenList, setChildren }) {
          const [isEditing, setIsEditing] = useState(false);
          const [editId, setEditId] = useState(null);
          const [form, setForm] = useState({ name: '', type: 'own', color: '#3B82F6' });

          const handleSubmit = (e) => {
            e.preventDefault();
            if (editId) {
              setChildren(childrenList.map(c => c.id === editId ? { ...c, ...form } : c));
            } else {
              setChildren([...childrenList, { id: generateId(), ...form }]);
            }
            resetForm();
          };

          const handleEdit = (child) => {
            setForm({ name: child.name, type: child.type, color: child.color });
            setEditId(child.id);
            setIsEditing(true);
          };

          const handleDelete = (id) => {
            if(confirm("确定要删除吗？相关的记录可能会受影响。")) {
              setChildren(childrenList.filter(c => c.id !== id));
            }
          };

          const resetForm = () => {
            setForm({ name: '', type: 'own', color: '#3B82F6' });
            setEditId(null);
            setIsEditing(false);
          };

          const colors = ['#EF4444', '#F97316', '#F59E0B', '#10B981', '#3B82F6', '#8B5CF6', '#EC4899'];

          return (
            <div className="space-y-6">
              <div className="content-card p-6">
                <h2 className="text-3xl font-bold mb-6 text-blue-900 border-b-2 pb-2">{isEditing ? '修改孩子资料' : '添加孩子'}</h2>
                <form onSubmit={handleSubmit} className="space-y-4">
                  <div>
                    <label className="block text-xl font-bold mb-2">名字</label>
                    <input required type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full p-3 border-2 rounded-xl text-xl" />
                  </div>
                  <div>
                    <label className="block text-xl font-bold mb-2">类别</label>
                    <select value={form.type} onChange={e => setForm({...form, type: e.target.value})} className="w-full p-3 border-2 rounded-xl text-xl">
                      <option value="own">儿子/女儿</option>
                      <option value="nephew">侄子/侄女</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-xl font-bold mb-2">专属颜色</label>
                    <div className="flex gap-2 flex-wrap">
                      {colors.map(c => (
                        <div key={c} onClick={() => setForm({...form, color: c})} className={`w-12 h-12 rounded-full cursor-pointer border-4 ${form.color === c ? 'border-gray-800 shadow-lg scale-110' : 'border-transparent'}`} style={{backgroundColor: c, transition: 'all 0.2s'}}></div>
                      ))}
                    </div>
                  </div>
                  <div className="flex gap-4">
                    <button type="submit" className="flex-1 bg-blue-500 text-white p-4 rounded-xl text-2xl font-bold shadow-lg hover:bg-blue-600">保存</button>
                    {isEditing && <button type="button" onClick={resetForm} className="flex-1 bg-gray-300 p-4 rounded-xl text-2xl font-bold hover:bg-gray-400">取消</button>}
                  </div>
                </form>
              </div>

              <div className="content-card p-6">
                <h2 className="text-3xl font-bold mb-4">孩子列表</h2>
                {childrenList.length === 0 && <p className="text-xl text-gray-500">还没有添加孩子呢！</p>}
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {childrenList.map(child => (
                    <div key={child.id} className="p-4 rounded-2xl flex justify-between items-center text-white shadow-lg" style={{backgroundColor: child.color}}>
                      <div className="text-2xl font-bold">
                        {child.name} <span className="text-sm bg-white/30 px-2 py-1 rounded ml-2">{child.type === 'own' ? '儿/女' : '侄/女'}</span>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => handleEdit(child)} className="p-2 bg-white/20 hover:bg-white/40 rounded-lg transition"><Icons.Edit /></button>
                        <button onClick={() => handleDelete(child.id)} className="p-2 bg-red-500/80 hover:bg-red-500 rounded-lg transition"><Icons.Trash /></button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        // --- 6. Tuition Manager ---
        function TuitionManager({ childrenList, teachers, setTeachers, tuitions, setTuitions }) {
          const [teacherForm, setTeacherForm] = useState({ name: '' });
          const [tuitionForm, setTuitionForm] = useState({
            teacherId: '', childId: '', subjects: '', feeAmount: '', 
            feeType: 'monthly', packageDuration: 3, 
            scheduleType: 'fixed', dayOfWeek: '1', time: '14:00', customSchedule: ''
          });
          const [editTuitionId, setEditTuitionId] = useState(null);

          const handleAddTeacher = (e) => {
            e.preventDefault();
            if(!teacherForm.name) return;
            setTeachers([...teachers, { id: generateId(), name: teacherForm.name }]);
            setTeacherForm({ name: '' });
          };

          const handleDeleteTeacher = (id) => {
            if(confirm("确定要删除这位老师吗？相关的补习设定也需要您手动调整。")) {
              setTeachers(teachers.filter(t => t.id !== id));
            }
          }

          const handleSaveTuition = (e) => {
            e.preventDefault();
            if (!tuitionForm.teacherId || !tuitionForm.childId) {
              alert("请选择老师和孩子"); return;
            }
            if (editTuitionId) {
              setTuitions(tuitions.map(t => t.id === editTuitionId ? { ...t, ...tuitionForm } : t));
            } else {
              setTuitions([...tuitions, { id: generateId(), ...tuitionForm }]);
            }
            setTuitionForm({
              teacherId: '', childId: '', subjects: '', feeAmount: '', 
              feeType: 'monthly', packageDuration: 3, 
              scheduleType: 'fixed', dayOfWeek: '1', time: '14:00', customSchedule: ''
            });
            setEditTuitionId(null);
          };

          const handleEditTuition = (t) => {
            setTuitionForm(t);
            setEditTuitionId(t.id);
          };

          const handleDeleteTuition = (id) => {
            if(confirm("确定删除此科目？")) {
              setTuitions(tuitions.filter(t => t.id !== id));
            }
          };

          const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

          return (
            <div className="space-y-6">
              {/* Teacher Setup */}
              <div className="content-card p-6">
                <h2 className="text-2xl font-bold mb-4 border-b-2 pb-2 text-blue-900">1. 添加补习老师</h2>
                <form onSubmit={handleAddTeacher} className="flex gap-4">
                  <input value={teacherForm.name} onChange={e=>setTeacherForm({name: e.target.value})} placeholder="输入老师名字" className="flex-1 p-3 border-2 rounded-xl text-xl" />
                  <button type="submit" className="bg-blue-500 text-white px-6 rounded-xl text-xl font-bold hover:bg-blue-600 shadow">添加</button>
                </form>
                <div className="flex flex-wrap gap-3 mt-4">
                  {teachers.map(t => (
                    <span key={t.id} className="bg-gray-200 px-4 py-2 rounded-full text-lg font-bold flex items-center shadow-sm">
                      {t.name}
                      <button onClick={() => handleDeleteTeacher(t.id)} className="ml-2 text-red-500 font-extrabold px-1">x</button>
                    </span>
                  ))}
                  {teachers.length === 0 && <span className="text-gray-500 text-lg">还没添加老师</span>}
                </div>
              </div>

              {/* Tuition Setup */}
              <div className="content-card p-6">
                <h2 className="text-3xl font-bold mb-6 border-b-2 pb-2 text-blue-900">{editTuitionId ? '修改科目设置' : '2. 分配科目与收费'}</h2>
                
                {teachers.length === 0 || childrenList.length === 0 ? (
                  <p className="text-red-500 text-xl font-bold bg-red-50 p-4 rounded-xl border border-red-200">⚠️ 请先在上面添加至少一位老师，并在“孩子管理”中添加孩子。</p>
                ) : (
                  <form onSubmit={handleSaveTuition} className="space-y-4">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-xl font-bold mb-2">选择老师</label>
                        <select required value={tuitionForm.teacherId} onChange={e=>setTuitionForm({...tuitionForm, teacherId: e.target.value})} className="w-full p-3 border-2 rounded-xl text-xl">
                          <option value="">- 请选择 -</option>
                          {teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xl font-bold mb-2">选择孩子</label>
                        <select required value={tuitionForm.childId} onChange={e=>setTuitionForm({...tuitionForm, childId: e.target.value})} className="w-full p-3 border-2 rounded-xl text-xl">
                          <option value="">- 请选择 -</option>
                          {childrenList.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                        </select>
                      </div>
                    </div>

                    <div>
                      <label className="block text-xl font-bold mb-2">科目名称 (可填多个)</label>
                      <input required value={tuitionForm.subjects} onChange={e=>setTuitionForm({...tuitionForm, subjects: e.target.value})} placeholder="例如：国语、英文" className="w-full p-3 border-2 rounded-xl text-xl" />
                    </div>

                    <div className="p-4 bg-yellow-50 border-2 border-yellow-200 rounded-xl space-y-4 shadow-sm">
                      <h3 className="text-xl font-bold text-yellow-800 border-b border-yellow-200 pb-2">收费设定</h3>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                          <label className="block text-lg font-bold mb-1">收费方式</label>
                          <select value={tuitionForm.feeType} onChange={e=>setTuitionForm({...tuitionForm, feeType: e.target.value})} className="w-full p-2 border-2 rounded-xl text-lg">
                            <option value="monthly">每月收费</option>
                            <option value="package">配套收费</option>
                          </select>
                        </div>
                        {tuitionForm.feeType === 'package' && (
                          <div>
                            <label className="block text-lg font-bold mb-1">配套月数</label>
                            <input type="number" min="1" value={tuitionForm.packageDuration} onChange={e=>setTuitionForm({...tuitionForm, packageDuration: e.target.value})} className="w-full p-2 border-2 rounded-xl text-lg" />
                          </div>
                        )}
                        <div>
                          <label className="block text-lg font-bold mb-1">总费用 (RM)</label>
                          <input required type="number" step="0.01" value={tuitionForm.feeAmount} onChange={e=>setTuitionForm({...tuitionForm, feeAmount: e.target.value})} className="w-full p-2 border-2 rounded-xl text-lg font-bold text-blue-700" />
                        </div>
                      </div>
                    </div>

                    <div className="p-4 bg-green-50 border-2 border-green-200 rounded-xl space-y-4 shadow-sm">
                      <h3 className="text-xl font-bold text-green-800 border-b border-green-200 pb-2">时间设定</h3>
                      <div>
                        <select value={tuitionForm.scheduleType} onChange={e=>setTuitionForm({...tuitionForm, scheduleType: e.target.value})} className="w-full p-3 border-2 rounded-xl text-xl mb-4">
                          <option value="fixed">固定每周时间 (可自动排入日历)</option>
                          <option value="custom">其他/灵活时间</option>
                        </select>
                        
                        {tuitionForm.scheduleType === 'fixed' ? (
                          <div className="flex gap-4">
                            <select value={tuitionForm.dayOfWeek} onChange={e=>setTuitionForm({...tuitionForm, dayOfWeek: e.target.value})} className="flex-1 p-3 border-2 rounded-xl text-xl">
                              {days.map((d, i) => <option key={i} value={i}>{d}</option>)}
                            </select>
                            <input type="time" value={tuitionForm.time} onChange={e=>setTuitionForm({...tuitionForm, time: e.target.value})} className="flex-1 p-3 border-2 rounded-xl text-xl font-bold" />
                          </div>
                        ) : (
                          <input placeholder="填写灵活时间备注..." value={tuitionForm.customSchedule} onChange={e=>setTuitionForm({...tuitionForm, customSchedule: e.target.value})} className="w-full p-3 border-2 rounded-xl text-xl" />
                        )}
                      </div>
                    </div>

                    <div className="flex gap-4 pt-4">
                      <button type="submit" className="flex-1 bg-blue-600 text-white p-4 rounded-xl text-2xl font-bold shadow-lg hover:bg-blue-700">{editTuitionId ? '保存修改' : '确认添加'}</button>
                      {editTuitionId && <button type="button" onClick={() => setEditTuitionId(null)} className="flex-1 bg-gray-300 p-4 rounded-xl text-2xl font-bold hover:bg-gray-400">取消</button>}
                    </div>
                  </form>
                )}
              </div>

              {/* List Tuitions */}
              <div className="content-card p-6">
                <h2 className="text-2xl font-bold mb-4">已设定的科目列表</h2>
                <div className="space-y-4">
                  {tuitions.length === 0 && <p className="text-xl text-gray-500">还未设置任何科目</p>}
                  {tuitions.map(t => {
                    const child = childrenList.find(c => c.id === t.childId);
                    const teacher = teachers.find(teach => teach.id === t.teacherId);
                    if (!child || !teacher) return null;

                    return (
                      <div key={t.id} className="border-2 border-gray-200 rounded-xl p-4 flex flex-col md:flex-row justify-between bg-white items-start md:items-center gap-4 shadow-sm hover:shadow-md transition">
                        <div>
                          <div className="text-xl font-extrabold" style={{color: child.color}}>
                            {child.name} - {t.subjects} <span className="text-gray-500 text-lg font-normal">(由 {teacher.name} 教)</span>
                          </div>
                          <div className="text-gray-700 mt-2 text-lg">
                            收费: <span className="font-extrabold text-blue-700">RM {t.feeAmount}</span> <span className="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm">{t.feeType === 'monthly' ? '每月' : `${t.packageDuration}个月配套`}</span>
                          </div>
                          <div className="text-gray-700 text-lg mt-1 font-bold">
                            时间: 🕒 {t.scheduleType === 'fixed' ? `${days[t.dayOfWeek]} ${t.time}` : t.customSchedule}
                          </div>
                        </div>
                        <div className="flex gap-2 self-end md:self-auto">
                          <button onClick={() => handleEditTuition(t)} className="bg-blue-100 text-blue-800 px-4 py-2 rounded-lg text-lg font-bold hover:bg-blue-200"><Icons.Edit/></button>
                          <button onClick={() => handleDeleteTuition(t.id)} className="bg-red-100 text-red-800 px-4 py-2 rounded-lg text-lg font-bold hover:bg-red-200"><Icons.Trash/></button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
