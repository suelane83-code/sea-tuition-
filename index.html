<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海底补习记(云端同步版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Firebase 配置 ---
        const firebaseConfig = {
          apiKey: "AIzaSyCtw29Kz1An1PjIpI1lFCPUCjOsGGZTaAA",
          authDomain: "seatuition-2.firebaseapp.com",
          projectId: "seatuition-2",
          storageBucket: "seatuition-2.firebasestorage.app",
          messagingSenderId: "1081496173041",
          appId: "1:1081496173041:web:7cfe63d1eec0f77290ec50",
          measurementId: "G-FM41SK8LXH"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- Utility: 图片压缩 ---
        const compressImage = (file) => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
              const img = new Image();
              img.src = event.target.result;
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500;
                let width = img.width;
                let height = img.height;
                if (width > MAX_WIDTH) {
                  height = Math.round((height * MAX_WIDTH) / width);
                  width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.6)); 
              };
            };
          });
        };

        // --- SVG Icons ---
        const Icons = {
          Home: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
          Calendar: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
          Users: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
          Book: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>,
          Check: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
          CreditCard: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>,
          Edit: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 Z"/></svg>,
          Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        };

        // --- Main App Component ---
        function App() {
          const [ready, setReady] = useState(false);
          const [authError, setAuthError] = useState(null);
          const [activeTab, setActiveTab] = useState('dashboard');
          const [currentDate] = useState(new Date());
          const currentMonthStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;

          const [childrenList, setChildren] = useState([]);
          const [teachers, setTeachers] = useState([]);
          const [tuitions, setTuitions] = useState([]);
          const [bills, setBills] = useState([]);
          const [attendance, setAttendance] = useState([]);

          useEffect(() => {
            auth.signInAnonymously().catch(err => setAuthError(err.message));
            const unsub = auth.onAuthStateChanged(user => { if (user) setReady(true); });
            return () => unsub();
          }, []);

          useEffect(() => {
            if (!ready) return;
            const unsubs = [];
            unsubs.push(db.collection('children').onSnapshot(snap => setChildren(snap.docs.map(d => ({id: d.id, ...d.data()})))));
            unsubs.push(db.collection('teachers').onSnapshot(snap => setTeachers(snap.docs.map(d => ({id: d.id, ...d.data()})))));
            unsubs.push(db.collection('tuitions').onSnapshot(snap => setTuitions(snap.docs.map(d => ({id: d.id, ...d.data()})))));
            unsubs.push(db.collection('bills').onSnapshot(snap => setBills(snap.docs.map(d => ({id: d.id, ...d.data()})))));
            unsubs.push(db.collection('attendance').onSnapshot(snap => setAttendance(snap.docs.map(d => ({id: d.id, ...d.data()})))));
            return () => unsubs.forEach(fn => fn());
          }, [ready]);

          useEffect(() => {
            const style = document.createElement('style');
            style.innerHTML = `
              body { background: linear-gradient(180deg, #87CEEB 0%, #1E90FF 100%); background-attachment: fixed; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
              .sea-creature { position: fixed; font-size: 3rem; z-index: -1; opacity: 0.6; pointer-events: none; }
              @keyframes swimR { 0% { transform: translateX(-10vw) translateY(0); } 100% { transform: translateX(110vw) translateY(-20px); } }
              @keyframes swimL { 0% { transform: translateX(110vw) translateY(0) scaleX(-1); } 100% { transform: translateX(-10vw) translateY(20px) scaleX(-1); } }
              @keyframes floatUp { 0% { transform: translateY(110vh) translateX(0); } 100% { transform: translateY(-10vh) translateX(20px); } }
              .fish1 { animation: swimR 20s linear infinite; top: 15%; } .fish2 { animation: swimL 25s linear infinite; top: 40%; font-size: 4rem; }
              .crab { animation: swimR 30s linear infinite; bottom: 5%; font-size: 2.5rem; } .jelly { animation: floatUp 15s ease-in-out infinite alternate; left: 20%; font-size: 5rem; }
              .octopus { animation: floatUp 22s ease-in-out infinite alternate; right: 15%; font-size: 4rem; }
              .content-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); z-index: 10; position: relative; }
              .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            `;
            document.head.appendChild(style);
            return () => document.head.removeChild(style);
          }, []);

          useEffect(() => {
            if (!ready || tuitions.length === 0) return;
            tuitions.forEach(tuition => {
              if (tuition.feeType === 'monthly') {
                const billExists = bills.some(b => b.tuitionId === tuition.id && b.month === currentMonthStr);
                if (!billExists) db.collection('bills').add({ tuitionId: tuition.id, teacherId: tuition.teacherId, childId: tuition.childId, month: currentMonthStr, amount: tuition.feeAmount, status: 'unpaid', createdAt: Date.now() });
              } else if (tuition.feeType === 'package') {
                 const tuitionBills = bills.filter(b => b.tuitionId === tuition.id).sort((a,b) => b.month.localeCompare(a.month));
                 const latestBill = tuitionBills[0];
                 if (!latestBill) {
                   db.collection('bills').add({ tuitionId: tuition.id, teacherId: tuition.teacherId, childId: tuition.childId, month: currentMonthStr, amount: tuition.feeAmount, status: 'unpaid', createdAt: Date.now() });
                 } else if (latestBill.status === 'paid') {
                   const lastPaidDate = new Date(latestBill.month + "-01");
                   const targetDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
                   const monthsDiff = (targetDate.getFullYear() - lastPaidDate.getFullYear()) * 12 + (targetDate.getMonth() - lastPaidDate.getMonth());
                   if (monthsDiff >= parseInt(tuition.packageDuration) && !tuitionBills.some(b => b.month === currentMonthStr)) {
                      db.collection('bills').add({ tuitionId: tuition.id, teacherId: tuition.teacherId, childId: tuition.childId, month: currentMonthStr, amount: tuition.feeAmount, status: 'unpaid', createdAt: Date.now() });
                   }
                 }
              }
            });
          }, [ready, tuitions, currentMonthStr]);

          if (authError) return <div className="p-10 text-xl font-bold text-red-800 bg-red-100 min-h-screen text-center">连接失败: {authError}</div>
          if (!ready) return <div className="text-2xl text-center p-10 font-bold text-white mt-20">正在连接云端... 🐟</div>;

          const tabs = [
            { id: 'dashboard', label: '首页统计', icon: <Icons.Home /> },
            { id: 'calendar', label: '补习日历', icon: <Icons.Calendar /> },
            { id: 'attendance', label: '打卡记录', icon: <Icons.Check /> },
            { id: 'payments', label: '付款管理', icon: <Icons.CreditCard /> },
            { id: 'children', label: '孩子管理', icon: <Icons.Users /> },
            { id: 'tuitions', label: '科目设置', icon: <Icons.Book /> },
          ];

          return (
            <div className="min-h-screen text-gray-800 pb-20">
              <div className="sea-creature fish1">🐠</div><div className="sea-creature fish2">🐡</div><div className="sea-creature crab">🦀</div><div className="sea-creature jelly">🪼</div><div className="sea-creature octopus">🐙</div>
              <div className="bg-green-600 text-white text-center py-1 text-sm font-bold shadow">✅ 云端同步已开启</div>
              <div className="bg-white/90 backdrop-blur sticky top-0 z-50 shadow-md">
                <div className="max-w-4xl mx-auto flex overflow-x-auto p-2 no-scrollbar">
                  {tabs.map(tab => (
                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-shrink-0 flex items-center px-4 py-3 mx-1 rounded-xl text-xl font-bold transition-colors ${activeTab === tab.id ? 'bg-blue-500 text-white shadow-lg' : 'bg-blue-100 text-blue-800 hover:bg-blue-200'}`}><span className="mr-2">{tab.icon}</span>{tab.label}</button>
                  ))}
                </div>
              </div>
              <div className="max-w-4xl mx-auto p-4 mt-4">
                {activeTab === 'dashboard' && <Dashboard childrenList={childrenList} tuitions={tuitions} bills={bills} currentMonthStr={currentMonthStr} teachers={teachers} />}
                {activeTab === 'calendar' && <CalendarView childrenList={childrenList} tuitions={tuitions} />}
                {activeTab === 'attendance' && <AttendanceManager childrenList={childrenList} tuitions={tuitions} attendance={attendance} currentMonthStr={currentMonthStr} />}
                {activeTab === 'payments' && <PaymentManager childrenList={childrenList} tuitions={tuitions} teachers={teachers} bills={bills} currentMonthStr={currentMonthStr} />}
                {activeTab === 'children' && <ChildrenManager childrenList={childrenList} />}
                {activeTab === 'tuitions' && <TuitionManager childrenList={childrenList} teachers={teachers} tuitions={tuitions} />}
              </div>
            </div>
          );
        }

        // --- DASHBOARD ---
        function Dashboard({ childrenList, tuitions, bills, currentMonthStr, teachers }) {
          const today = new Date();
          const todayDayOfWeek = today.getDay();
          const todayIso = today.toISOString().split('T')[0];
          const todaysTuitions = tuitions.filter(t => {
            if (t.scheduleType === 'fixed') return parseInt(t.dayOfWeek) === todayDayOfWeek;
            return t.customDate === todayIso;
          }).sort((a, b) => a.time.localeCompare(b.time));
          const currentMonthBills = bills.filter(b => b.month === currentMonthStr);
          const unpaidBills = currentMonthBills.filter(b => b.status === 'unpaid');
          let ownExpenses = 0; let nephewExpenses = 0;
          currentMonthBills.forEach(bill => {
            const child = childrenList.find(c => c.id === bill.childId);
            if (child) {
              const amount = parseFloat(bill.amount) || 0;
              if (child.type === 'own') ownExpenses += amount; else nephewExpenses += amount;
            }
          });
          return (
            <div className="space-y-6">
              <div className="bg-cyan-100 border-l-8 border-cyan-500 text-cyan-900 p-6 rounded-xl shadow">
                <h2 className="text-3xl font-bold mb-3 flex items-center">🐠 今日补习提醒</h2>
                {todaysTuitions.length > 0 ? (
                  <ul className="space-y-3 text-2xl">
                    {todaysTuitions.map(t => {
                      const child = childrenList.find(c => c.id === t.childId);
                      const teacher = teachers.find(teach => teach.id === t.teacherId);
                      return (
                        <li key={t.id} className="bg-white/60 p-4 rounded-lg flex flex-col md:flex-row md:items-center">
                          <span className="font-bold text-cyan-700 w-28">⏰ {t.time}</span>
                          <div><span className="font-extrabold mx-2 text-3xl" style={{color: child?.color}}>{child?.name}</span><span>- {t.subjects} ({teacher?.name})</span></div>
                        </li>
                      );
                    })}
                  </ul>
                ) : <p className="text-2xl font-bold text-cyan-700">今天没有补习，好好休息！🌿</p>}
              </div>
              <div className="content-card p-6">
                <h2 className="text-3xl font-bold mb-6 text-blue-900 border-b-2 pb-2">本月费用统计 ({currentMonthStr})</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="bg-blue-50 p-6 rounded-2xl border-2 border-blue-200"><h3 className="text-2xl font-bold text-blue-800 mb-2">👦👧 儿子女儿</h3><p className="text-4xl font-extrabold text-blue-600">RM {ownExpenses.toFixed(2)}</p></div>
                  <div className="bg-purple-50 p-6 rounded-2xl border-2 border-purple-200"><h3 className="text-2xl font-bold text-purple-800 mb-2">🧑‍🤝‍🧑 侄子侄女</h3><p className="text-4xl font-extrabold text-purple-600">RM {nephewExpenses.toFixed(2)}</p></div>
                </div>
              </div>
            </div>
          );
        }

        // --- CALENDAR ---
        function CalendarView({ childrenList, tuitions }) {
          const [date, setDate] = useState(new Date());
          const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
          const firstDayOfMonth = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
          const daysInMonth = getDaysInMonth(date.getFullYear(), date.getMonth());
          const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
          const days = [];
          for (let i = 0; i < firstDayOfMonth; i++) days.push(null);
          for (let i = 1; i <= daysInMonth; i++) days.push(i);
          const getEventsForDay = (day) => {
            if (!day) return [];
            const d = new Date(date.getFullYear(), date.getMonth(), day);
            const currentDayOfWeek = d.getDay();
            const currentIsoDate = d.toISOString().split('T')[0];
            return tuitions.filter(t => {
              if (t.scheduleType === 'fixed') return parseInt(t.dayOfWeek) === currentDayOfWeek;
              return t.customDate === currentIsoDate;
            }).map(t => ({ ...t, child: childrenList.find(c => c.id === t.childId) })).filter(t => t.child);
          };
          return (
            <div className="content-card p-4 md:p-6">
              <div className="flex justify-between items-center mb-6">
                <button onClick={() => setDate(new Date(date.getFullYear(), date.getMonth() - 1, 1))} className="p-3 bg-blue-100 rounded-xl text-xl font-bold">上月</button>
                <h2 className="text-3xl font-bold">{date.getFullYear()}年 {monthNames[date.getMonth()]}</h2>
                <button onClick={() => setDate(new Date(date.getFullYear(), date.getMonth() + 1, 1))} className="p-3 bg-blue-100 rounded-xl text-xl font-bold">下月</button>
              </div>
              <div className="grid grid-cols-7 gap-1 md:gap-2 text-center text-lg md:text-xl font-bold mb-2">
                {['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d} className="text-blue-800">{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-1 md:gap-2">
                {days.map((day, index) => (
                  <div key={index} className={`min-h-[100px] border-2 rounded-xl p-1 ${day ? 'bg-white border-gray-200' : 'bg-transparent border-transparent'}`}>
                    {day && <div className="font-bold text-gray-500">{day}</div>}
                    {getEventsForDay(day).map((ev, i) => (
                      <div key={i} className="text-xs p-1 rounded font-bold text-white mb-1" style={{ backgroundColor: ev.child.color }}>{ev.time} {ev.child.name}</div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          );
        }

        // --- ATTENDANCE ---
        function AttendanceManager({ childrenList, tuitions, attendance, currentMonthStr }) {
          const handleSlotClick = async (tuitionId, childId, slotIndex, currentStatus) => {
            let newStatus = currentStatus === 'attended' ? 'missed' : currentStatus === 'missed' ? null : 'attended';
            let note = newStatus === 'missed' ? (prompt("为何缺席？") || "无原因") : "";
            const attRecord = attendance.find(a => a.tuitionId === tuitionId && a.month === currentMonthStr);
            if (attRecord) {
              const newSlots = [...(attRecord.slots || Array(7).fill({ status: null, note: '' }))];
              newSlots[slotIndex] = { status: newStatus, note };
              await db.collection('attendance').doc(attRecord.id).update({ slots: newSlots });
            } else {
              const newSlots = Array(7).fill({ status: null, note: '' });
              newSlots[slotIndex] = { status: newStatus, note };
              await db.collection('attendance').add({ tuitionId, childId, month: currentMonthStr, slots: newSlots });
            }
          };
          return (
            <div className="content-card p-6">
              <h2 className="text-3xl font-bold mb-6 text-blue-900 border-b-2 pb-2">本月打卡 ({currentMonthStr})</h2>
              {childrenList.map(child => {
                const childTuitions = tuitions.filter(t => t.childId === child.id);
                if (!childTuitions.length) return null;
                return (
                  <div key={child.id} className="mb-8 border-4 rounded-2xl overflow-hidden" style={{ borderColor: child.color }}>
                    <div className="p-4 text-2xl font-bold text-white" style={{ backgroundColor: child.color }}>{child.name}</div>
                    <div className="p-4 bg-white overflow-x-auto">
                      <table className="w-full text-xl">
                        {childTuitions.map(tuition => {
                          const att = attendance.find(a => a.tuitionId === tuition.id && a.month === currentMonthStr) || { slots: Array(7).fill({ status: null }) };
                          return (
                            <tr key={tuition.id} className="border-b border-gray-100">
                              <td className="py-4 font-bold">{tuition.subjects}</td>
                              {[0,1,2,3,4,5,6].map(idx => {
                                const slot = att.slots[idx] || { status: null };
                                let bg = slot.status === 'attended' ? 'bg-green-500' : slot.status === 'missed' ? 'bg-red-500' : 'bg-gray-100';
                                return (
                                  <td key={idx} className="p-1"><button onClick={() => handleSlotClick(tuition.id, child.id, idx, slot.status)} className={`w-12 h-12 rounded-xl text-white font-bold ${bg}`}>{slot.status === 'attended' ? '√' : slot.status === 'missed' ? 'X' : ''}</button></td>
                                );
                              })}
                            </tr>
                          );
                        })}
                      </table>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        }

        // --- PAYMENT ---
        function PaymentManager({ childrenList, tuitions, teachers, bills, currentMonthStr }) {
          const [showHistory, setShowHistory] = useState(false);
          
          const handlePay = async (billId) => await db.collection('bills').doc(billId).update({ status: 'paid', paidAt: Date.now() });
          const handleUnpay = async (billId) => await db.collection('bills').doc(billId).update({ status: 'unpaid', receiptData: null });
          const handleUpload = async (e, billId) => {
            const base64 = await compressImage(e.target.files[0]);
            await db.collection('bills').doc(billId).update({ receiptData: base64 });
            alert("上传成功！");
          };

          // 新增：修改金额功能
          const handleEditBill = async (billId, oldAmount) => {
            const newAmount = prompt("请输入新的金额 (RM):", oldAmount);
            if (newAmount !== null && newAmount !== "" && !isNaN(newAmount)) {
              await db.collection('bills').doc(billId).update({ amount: newAmount });
            }
          };

          // 新增：彻底删除账单功能
          const handleDeleteBill = async (billId) => {
            if(confirm("确定要彻底删除这笔账单吗？删除后无法恢复。")) {
              await db.collection('bills').doc(billId).delete();
            }
          };

          const currentMonthBills = bills.filter(b => b.month === currentMonthStr);
          const pastBills = bills.filter(b => b.month !== currentMonthStr).sort((a,b) => b.month.localeCompare(a.month));

          return (
            <div className="content-card p-6">
              <div className="flex justify-between mb-6">
                <h2 className="text-3xl font-bold text-blue-900">付款管理</h2>
                <button onClick={() => setShowHistory(!showHistory)} className="bg-purple-500 text-white px-4 py-2 rounded-xl font-bold">{showHistory ? '查看本月' : '历史记录'}</button>
              </div>
              {!showHistory ? (
                teachers.map(teacher => {
                  const teacherBills = currentMonthBills.filter(b => b.teacherId === teacher.id);
                  if (!teacherBills.length) return null;
                  return (
                    <div key={teacher.id} className="border-4 border-blue-200 rounded-2xl p-4 mb-4 bg-white">
                      <h3 className="text-2xl font-bold mb-4 bg-blue-100 p-2 rounded-xl">👨‍🏫 {teacher.name}</h3>
                      {teacherBills.map(bill => {
                        const child = childrenList.find(c => c.id === bill.childId);
                        const tuition = tuitions.find(t => t.id === bill.tuitionId);
                        const isPaid = bill.status === 'paid';
                        return (
                          <div key={bill.id} className={`p-4 rounded-xl border-2 flex flex-col md:flex-row justify-between items-center mb-2 ${isPaid ? 'border-green-400 bg-green-50' : 'border-red-400 bg-red-50'}`}>
                            <div className="w-full flex justify-between items-center">
                              <div className="text-xl">
                                <span className="font-bold" style={{color: child?.color}}>{child?.name}</span>
                                <span className="mx-2 text-gray-400">|</span>
                                <span>{tuition?.subjects || '补习'}</span>
                                <div className="font-bold text-2xl mt-1">RM {bill.amount}</div>
                              </div>
                              
                              {/* 这里的修改与删除按钮 */}
                              <div className="flex gap-2">
                                <button onClick={() => handleEditBill(bill.id, bill.amount)} className="p-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200"><Icons.Edit /></button>
                                <button onClick={() => handleDeleteBill(bill.id)} className="p-2 bg-red-50 text-red-500 rounded-lg hover:bg-red-100"><Icons.Trash /></button>
                              </div>
                            </div>

                            <div className="flex items-center gap-2 mt-4 md:mt-0 w-full md:w-auto justify-end">
                              {isPaid ? (
                                <>
                                  <span className="text-green-600 font-bold text-xl">✅ 已付</span>
                                  {bill.receiptData && <img src={bill.receiptData} className="w-14 h-14 rounded border shadow-sm" onClick={() => window.open(bill.receiptData)} />}
                                  <button onClick={() => handleUnpay(bill.id)} className="text-gray-400 underline text-sm ml-2">撤销</button>
                                </>
                              ) : (
                                <>
                                  <label className="bg-gray-200 px-3 py-2 rounded-xl cursor-pointer font-bold">上传单据<input type="file" className="hidden" onChange={e => handleUpload(e, bill.id)} /></label>
                                  <button onClick={() => handlePay(bill.id)} className="bg-red-500 text-white px-6 py-2 rounded-xl font-bold shadow-lg">确认付款</button>
                                </>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })
              ) : (
                <div className="space-y-2">
                  {pastBills.map(bill => {
                    const child = childrenList.find(c=>c.id===bill.childId);
                    return (
                      <div key={bill.id} className="p-4 border-2 rounded-xl flex justify-between items-center bg-white">
                        <div>
                          <div className="font-bold">{bill.month} - {child?.name}</div>
                          <div className="text-xl font-bold text-blue-600">RM {bill.amount}</div>
                        </div>
                        <div className="flex gap-2">
                           <button onClick={() => handleEditBill(bill.id, bill.amount)} className="p-2 bg-gray-100 rounded-lg"><Icons.Edit /></button>
                           <button onClick={() => handleDeleteBill(bill.id)} className="p-2 bg-red-50 text-red-500 rounded-lg"><Icons.Trash /></button>
                        </div>
                      </div>
                    )
                  })}
                </div>
              )}
            </div>
          );
        }

        // --- CHILDREN MANAGER ---
        function ChildrenManager({ childrenList }) {
          const [form, setForm] = useState({ name: '', type: 'own', color: '#3B82F6' });
          const [editId, setEditId] = useState(null);
          const handleSubmit = async (e) => {
            e.preventDefault();
            if (editId) await db.collection('children').doc(editId).update(form);
            else await db.collection('children').add(form);
            setForm({ name: '', type: 'own', color: '#3B82F6' }); setEditId(null);
          };
          const colors = ['#EF4444', '#F97316', '#F59E0B', '#10B981', '#3B82F6', '#8B5CF6', '#EC4899'];
          return (
            <div className="space-y-6">
              <div className="content-card p-6">
                <h2 className="text-3xl font-bold mb-6 text-blue-900 border-b-2 pb-2">孩子资料</h2>
                <form onSubmit={handleSubmit} className="space-y-4">
                  <input required value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="名字" className="w-full p-4 border-2 rounded-xl text-2xl" />
                  <select value={form.type} onChange={e => setForm({...form, type: e.target.value})} className="w-full p-4 border-2 rounded-xl text-2xl"><option value="own">儿子/女儿</option><option value="nephew">侄子/侄女</option></select>
                  <div className="flex gap-2 flex-wrap">{colors.map(c => <div key={c} onClick={() => setForm({...form, color: c})} className={`w-14 h-14 rounded-full border-4 ${form.color === c ? 'border-black' : 'border-transparent'}`} style={{backgroundColor: c}}></div>)}</div>
                  <button type="submit" className="w-full bg-blue-500 text-white p-4 rounded-xl text-2xl font-bold shadow-lg">{editId ? '保存' : '添加'}</button>
                </form>
              </div>
              <div className="content-card p-6">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {childrenList.map(c => (
                    <div key={c.id} className="p-4 rounded-2xl flex justify-between items-center text-white" style={{backgroundColor: c.color}}>
                      <span className="text-2xl font-bold">{c.name} ({c.type === 'own' ? '儿/女' : '侄'})</span>
                      <div className="flex gap-2">
                        <button onClick={() => {setForm(c); setEditId(c.id);}} className="bg-white/20 p-2 rounded-lg">修改</button>
                        <button onClick={() => db.collection('children').doc(c.id).delete()} className="bg-red-500/50 p-2 rounded-lg">删除</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        // --- TUITION MANAGER ---
        function TuitionManager({ childrenList, teachers, tuitions }) {
          const [teacherName, setTeacherName] = useState('');
          const [tuitionForm, setTuitionForm] = useState({ 
            teacherId: '', childId: '', subjects: '', feeAmount: '', feeType: 'monthly', 
            packageDuration: 3, scheduleType: 'fixed', dayOfWeek: '1', time: '14:00',
            customDate: '', customTime: '14:00'
          });
          const [editId, setEditId] = useState(null);

          const handleSaveTuition = async (e) => {
            e.preventDefault();
            if (!tuitionForm.teacherId || !tuitionForm.childId) return alert("请选老师和孩子");
            if (editId) await db.collection('tuitions').doc(editId).update(tuitionForm);
            else await db.collection('tuitions').add(tuitionForm);
            setTuitionForm({ teacherId: '', childId: '', subjects: '', feeAmount: '', feeType: 'monthly', packageDuration: 3, scheduleType: 'fixed', dayOfWeek: '1', time: '14:00', customDate: '', customTime: '14:00' });
            setEditId(null);
          };

          const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

          return (
            <div className="space-y-6">
              <div className="content-card p-6">
                <h2 className="text-2xl font-bold mb-4 border-b-2 pb-2 text-blue-900">1. 添加老师</h2>
                <div className="flex gap-4">
                  <input value={teacherName} onChange={e=>setTeacherName(e.target.value)} placeholder="老师名字" className="flex-1 p-3 border-2 rounded-xl text-xl" />
                  <button onClick={async ()=>{if(teacherName) await db.collection('teachers').add({name: teacherName}); setTeacherName('')}} className="bg-blue-500 text-white px-6 rounded-xl font-bold">添加</button>
                </div>
              </div>

              <div className="content-card p-6">
                <h2 className="text-3xl font-bold mb-6 text-blue-900 border-b-2 pb-2">2. 分配科目与收费</h2>
                <form onSubmit={handleSaveTuition} className="space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <select required value={tuitionForm.teacherId} onChange={e=>setTuitionForm({...tuitionForm, teacherId: e.target.value})} className="p-3 border-2 rounded-xl text-xl"><option value="">- 选老师 -</option>{teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}</select>
                    <select required value={tuitionForm.childId} onChange={e=>setTuitionForm({...tuitionForm, childId: e.target.value})} className="p-3 border-2 rounded-xl text-xl"><option value="">- 选孩子 -</option>{childrenList.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
                  </div>
                  <input required value={tuitionForm.subjects} onChange={e=>setTuitionForm({...tuitionForm, subjects: e.target.value})} placeholder="科目名称" className="w-full p-4 border-2 rounded-xl text-xl" />
                  
                  <div className="p-4 bg-yellow-50 border-2 border-yellow-200 rounded-xl space-y-4">
                    <select value={tuitionForm.feeType} onChange={e=>setTuitionForm({...tuitionForm, feeType: e.target.value})} className="w-full p-3 border-2 rounded-xl text-xl"><option value="monthly">每月收费</option><option value="package">配套收费</option></select>
                    <div className="flex gap-4">
                      {tuitionForm.feeType === 'package' && <input placeholder="几个月" type="number" value={tuitionForm.packageDuration} onChange={e=>setTuitionForm({...tuitionForm, packageDuration: e.target.value})} className="flex-1 p-3 border-2 rounded-xl text-xl" />}
                      <input placeholder="总费用 RM" required type="number" step="0.01" value={tuitionForm.feeAmount} onChange={e=>setTuitionForm({...tuitionForm, feeAmount: e.target.value})} className="flex-1 p-3 border-2 rounded-xl text-xl font-bold" />
                    </div>
                  </div>

                  <div className="p-4 bg-green-50 border-2 border-green-200 rounded-xl space-y-4">
                    <select value={tuitionForm.scheduleType} onChange={e=>setTuitionForm({...tuitionForm, scheduleType: e.target.value})} className="w-full p-4 border-2 rounded-xl text-xl">
                      <option value="fixed">固定每周时间</option>
                      <option value="custom">灵活时间 (指定某一天)</option>
                    </select>
                    {tuitionForm.scheduleType === 'fixed' ? (
                      <div className="flex gap-4">
                        <select value={tuitionForm.dayOfWeek} onChange={e=>setTuitionForm({...tuitionForm, dayOfWeek: e.target.value})} className="flex-1 p-3 border-2 rounded-xl text-xl">{days.map((d,i)=><option key={i} value={i}>{d}</option>)}</select>
                        <input type="time" value={tuitionForm.time} onChange={e=>setTuitionForm({...tuitionForm, time: e.target.value})} className="flex-1 p-3 border-2 rounded-xl text-xl" />
                      </div>
                    ) : (
                      <div className="flex flex-col gap-4">
                        <div>
                          <label className="block text-sm font-bold text-green-800 mb-1">选择补习日期：</label>
                          <input required type="date" value={tuitionForm.customDate} onChange={e=>setTuitionForm({...tuitionForm, customDate: e.target.value})} className="w-full p-4 border-2 rounded-xl text-2xl" />
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-green-800 mb-1">选择补习时间：</label>
                          <input required type="time" value={tuitionForm.customTime} onChange={e=>setTuitionForm({...tuitionForm, customTime: e.target.value})} className="w-full p-4 border-2 rounded-xl text-2xl" />
                        </div>
                      </div>
                    )}
                  </div>
                  <button type="submit" className="w-full bg-blue-600 text-white p-4 rounded-xl text-2xl font-bold shadow-lg">{editId ? '保存修改' : '确认添加'}</button>
                </form>
              </div>

              <div className="content-card p-6">
                <h2 className="text-2xl font-bold mb-4">列表</h2>
                {tuitions.map(t => (
                  <div key={t.id} className="border-2 rounded-xl p-4 mb-2 flex justify-between items-center bg-white shadow-sm">
                    <div>
                      <div className="text-xl font-bold" style={{color: childrenList.find(c=>c.id===t.childId)?.color}}>{childrenList.find(c=>c.id===t.childId)?.name} - {t.subjects}</div>
                      <div className="text-gray-500">
                        收费: RM {t.feeAmount} ({t.feeType === 'monthly' ? '每月' : t.packageDuration + '月'}) <br/>
                        时间: {t.scheduleType === 'fixed' ? days[t.dayOfWeek] + " " + t.time : t.customDate + " " + t.customTime}
                      </div>
                    </div>
                    <div className="flex gap-2">
                       <button onClick={()=>{setTuitionForm(t); setEditId(t.id);}} className="text-blue-500 font-bold">修改</button>
                       <button onClick={()=>db.collection('tuitions').doc(t.id).delete()} className="text-red-500 font-bold ml-2">删除</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
